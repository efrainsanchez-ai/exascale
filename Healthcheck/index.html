          { id: "default-service", title: "10. Revisión de Configuración del Servicio de Conexión por Defecto", kicker: "Línea base del servicio de conexión", body: "Revisar la configuración del servicio de conexión por defecto y comparar sus características actuales.", code: { type: "bash", label: "Configuración del servicio por defecto", value: commands.defaultService }, expected: commands.defaultServiceOutput, table: { headers: ["Característica", "Valor", "Valores documentados por Oracle"], rows: [["Failover type", "NONE", "NONE, SESSION, SELECT, TRANSACTION, AUTO"], ["Runtime Load Balancing Goal", "NONE", "NONE, SERVICE_TIME, THROUGHPUT"], ["Connection Load Balancing Goal", "LONG", "SHORT, LONG"]] }, notes: ["Esta salida muestra que el servicio PDB por defecto CDB01_PDB01.paas.oracle.com está habilitado para el rol PRIMARY y mapeado a PDB01.", "Cardinality 2 con instancias preferred CDB011,CDB012 significa que el servicio se ubica en ambas instancias RAC durante operación normal; no hay instancias available listadas para ubicación alterna.", "Failover type NONE, failover method NONE, TAF policy NONE, Commit Outcome FALSE y Failover restore NONE significan que este servicio por defecto no está configurado para TAF del lado servidor, Transaction Guard ni comportamiento de replay estilo Application Continuity.", "Connection Load Balancing Goal LONG favorece balanceo por conteo de sesiones para conexiones de mayor duración, mientras que Runtime Load Balancing Goal NONE significa que el servicio no publica objetivos de runtime load balancing advisory como SERVICE_TIME o THROUGHPUT."], references: [{ label: "Referencia de comandos SRVCTL service", url: refs.srvctl }] },
          { id: "oltp", title: "11. Configuración OLTP Recomendada (Eficiente en Memoria)", kicker: "Sección de mejores prácticas", body: "Para la recomendación OLTP eficiente en memoria de esta guía, usa estos valores.", collapsible: true, code: { type: "bash", label: "Modificación de servicio para failover OLTP", value: commands.oltpModify }, extraCodes: [{ type: "text", label: "Alias TNS recomendado para la capa de aplicación", value: commands.oltpTnsAlias }, { type: "sql", label: "Verificación de instancia conectada con SQL*Plus", value: commands.oltpInstanceCheck }], table: { headers: ["Atributo", "Valor recomendado", "Valores documentados por Oracle"], rows: [["Failover Type", "SESSION", "SRVCTL: NONE, SESSION, SELECT, TRANSACTION, AUTO; TNS FAILOVER_MODE TYPE: session, select, none"], ["Failover Retries", "30", "Cantidad entera de reintentos"], ["Failover Delay", "5", "Demora entera en segundos"]] }, notes: ["Oracle AI Database 26ai depreca la opción SRVCTL -failovermethod, por lo que SRVCTL advierte que será ignorada. Elimina -failovermethod de los scripts de modificación de servicio.", "Para failover de sesión estilo TAF, conserva -failovertype SESSION con valores de retry y delay. Para clientes y pools con capacidad de replay, prefiere Transparent Application Continuity o Application Continuity, que usan -failovertype AUTO o TRANSACTION con commit outcome y parámetros de replay."], references: [{ label: "Referencia de comandos SRVCTL service", url: refs.srvctl }, { label: "Parámetros SRVCTL deprecados", url: refs.srvctlCluster }, { label: "Application Continuity", url: refs.appContinuity }, { label: "Parámetros Oracle Net FAILOVER_MODE", url: refs.failoverMode }] },
          { id: "rlb", title: "12. Configuración OLTP Recomendada para Runtime Load Balancing", kicker: "Balanceo runtime", body: "Habilitar runtime load balancing en el servicio existente CDB01_PDB01.paas.oracle.com para que los pools integrados puedan enrutar trabajo nuevo hacia la instancia RAC con mejor throughput actual. Esto conserva el mismo nombre de servicio y evita la sobrecarga operativa de un servicio adicional, mientras que el impacto de CPU y memoria del lado de la base de datos es mínimo porque el cambio usa metadata de RAC service advisory en lugar de iniciar procesos de base de datos adicionales. El beneficio es mejor uso de ambas instancias, menos sesiones ancladas a un nodo más lento y respuesta más uniforme bajo condiciones cambiantes de carga.", collapsible: true, code: { type: "bash", label: "Aplicar actualización de servicio para runtime load balancing", value: commands.oltpRlbModify }, extraCodes: [{ type: "bash", label: "Validar configuración actualizada del servicio", value: commands.oltpRlbVerify }, { type: "sql", label: "Verificar configuración del servicio desde GV$SERVICES", value: commands.rlbServiceSettingsSql }, { type: "sql", label: "Verificación de instancia conectada con SQL*Plus", value: commands.rlbInstanceCheck }], notes: ["Este cambio mantiene el SERVICE_NAME existente, por lo que los clientes de aplicación pueden seguir usando CDB01_PDB01.paas.oracle.com.", "Ejecuta el comando de validación después del comando modify para confirmar que SRVCTL reporta Connection Load Balancing Goal SHORT y Runtime Load Balancing Goal THROUGHPUT para el servicio.", "Usa la consulta GV$SERVICES desde una cuenta DBA o de monitoreo para confirmar filas por instancia donde CLB_GOAL es SHORT y GOAL es THROUGHPUT desde dentro de la base de datos.", "No se requiere un alias separado de capa de aplicación para esta sección. Runtime load balancing se controla mediante atributos del servicio, por lo que los alias existentes de la sección 9 o la sección 11 que resuelven a CDB01_PDB01.paas.oracle.com heredan el comportamiento actualizado del servicio.", "Comparado con el alias OLTP de la sección 11, la sintaxis de conexión puede mantenerse más simple aquí porque runtime load balancing se controla mediante la configuración del servicio y advisories de pools integrados, no agregando un bloque FAILOVER_MODE del lado cliente al descriptor TNS.", "Connection Load Balancing Goal SHORT es el objetivo de conexión recomendado para pools integrados que usan advisories de runtime load balancing.", "Runtime Load Balancing Goal THROUGHPUT enruta trabajo hacia la instancia que completa trabajo a la tasa más alta. Usa SERVICE_TIME cuando el objetivo principal sea el tiempo de respuesta de transacciones OLTP cortas; usa connection balancing LONG principalmente para cargas cerradas o estilo batch."], table: { headers: ["Atributo", "Valor recomendado", "Valor por defecto", "Valores documentados por Oracle"], rows: [["Connection Load Balancing Goal", "SHORT", "LONG", "SHORT, LONG"], ["Runtime Load Balancing Goal", "THROUGHPUT", "NONE", "NONE, SERVICE_TIME, THROUGHPUT"]] }, references: [{ label: "Referencia de comandos SRVCTL service", url: refs.srvctl }, { label: "Run-time connection load balancing", url: refs.rlb }, { label: "Referencia GV$SERVICES", url: refs.gvservices }] },
          { id: "report-service", title: "13. Aislamiento de Servicio para Reportes", kicker: "Servicio dedicado para cargas de reportes", body: "Crear un servicio separado para sesiones de reportes de lectura intensiva y larga duración y preferirlo en una sola instancia RAC. Fijar la ruta normal de reportes a una instancia preferred mantiene escaneos grandes, ordenamientos, uso de espacio temporal y churn de buffer cache lejos de la instancia orientada a OLTP, mientras la segunda instancia sigue disponible si falla el nodo preferred o la colocación del servicio. Es un patrón de aislamiento de carga, no un límite de capacidad: la instancia available preserva disponibilidad del servicio, pero la carga diaria de reportes permanece predecible y más fácil de medir con métricas AWR por servicio.", collapsible: true, code: { type: "bash", label: "Creación y validación del servicio de reportes", value: commands.reportsService }, extraCodes: [{ type: "text", label: "Alias TNS de capa de aplicación para reportes", value: commands.reportsTnsAlias }, { type: "sql", label: "Verificación de instancia conectada con SQL*Plus", value: commands.reportsInstanceCheck }], notes: ["Usa nombres de instancia de base de datos en -preferred y -available. Este ejemplo envía la carga normal de reportes a CDB012 y mantiene CDB011 disponible solo cuando el servicio de reportes no pueda ejecutarse en la instancia preferred.", "Mantener reportes en una instancia preferred reduce churn de cache entre nodos y protege el servicio OLTP de escaneos o agregaciones grandes de reportes. Si falla el nodo preferred de reportes, Oracle Clusterware puede iniciar el servicio en la instancia available para que los usuarios conserven un endpoint de servicio.", "El alias TNS de reportes es intencionalmente más simple que el alias OLTP de la sección 11. Omite el bloque FAILOVER_MODE del lado cliente porque este servicio de reportes usa colocación explícita del servicio y comportamiento de carga reiniciable en lugar de failover de sesión estilo TAF.", "Connection Load Balancing Goal LONG es apropiado para sesiones de reportes que tienden a ser largas y deben balancearse por conteo de sesiones en lugar de feedback runtime advisory.", "Runtime Load Balancing Goal NONE evita publicar objetivos runtime advisory para cargas de reportes. Mantén el ruteo de reportes explícito para que escaneos o agregaciones grandes no compitan directamente con el servicio OLTP.", "Failover Type NONE es intencional para reportes porque esta carga normalmente es reiniciable. Si un nodo falla durante un reporte, la aplicación o herramienta de reportes debe reejecutar la consulta o job en lugar de intentar continuar una sentencia larga ejecutada parcialmente."], table: { headers: ["Atributo", "Valor recomendado", "Razón"], rows: [["Connection Load Balancing Goal", "LONG", "Las sesiones largas de reportes se balancean mejor por conteo de sesiones."], ["Runtime Load Balancing Goal", "NONE", "Las cargas de reportes se enrutan explícitamente en lugar de usar objetivos RLB advisory."], ["Instancias preferred / available", "CDB012 / CDB011", "La carga normal de reportes permanece en una instancia, mientras la otra queda reservada para failover del servicio."], ["Failover Type", "NONE", "Los reportes son reiniciables y deben reejecutarse desde la aplicación o capa de reportes después de una falla."]] }, references: [{ label: "Referencia de comandos SRVCTL service", url: refs.srvctl }, { label: "Workload management with services", url: refs.srvctlCluster }] },
          { id: "batch-jobs", title: "14. Aislamiento de Servicios para Batch Jobs", kicker: "Servicio dedicado para cargas batch", body: "Crear un servicio batch separado para jobs programados y reiniciables y preferirlo en una sola instancia RAC. Fijar la ruta normal de batch a CDB011 mantiene ETL, mantenimiento y procesamiento en segundo plano lejos de la ruta del servicio orientado a OLTP, mientras CDB012 sigue disponible si falla el nodo batch preferred o la colocación del servicio. Es un patrón de aislamiento de carga, no un límite de capacidad: la carga batch permanece predecible durante ventanas normales, y la instancia available preserva disponibilidad del servicio sin hacer que cada paso batch en ejecución dependa de failover de sesión.", collapsible: true, code: { type: "bash", label: "Creación y validación del servicio batch", value: commands.batchService }, extraCodes: [{ type: "text", label: "Alias TNS de capa de aplicación para batch jobs", value: commands.batchTnsAlias }], notes: ["Usa nombres de instancia de base de datos en -preferred y -available. Este ejemplo envía la carga normal batch a CDB011 y mantiene CDB012 disponible solo cuando el servicio batch no pueda ejecutarse en la instancia preferred.", "Mantener batch jobs en una instancia preferred reduce churn de cache entre nodos y facilita medir la carga programada con métricas AWR por servicio. Si falla el nodo preferred de batch, Oracle Clusterware puede iniciar el servicio en la instancia available para que el scheduler conserve un endpoint de servicio.", "Connection Load Balancing Goal LONG es apropiado para sesiones batch que tienden a ser largas y deben balancearse por conteo de sesiones en lugar de feedback runtime advisory.", "Runtime Load Balancing Goal NONE mantiene el ruteo batch explícito para que jobs grandes no compitan directamente con decisiones de runtime load balancing de OLTP.", "Failover Type NONE es intencional para batch jobs porque esta carga normalmente es reiniciable. Si un nodo falla durante un paso batch, el scheduler o la aplicación debe reejecutar el paso del job en lugar de intentar continuar una sentencia larga ejecutada parcialmente."], table: { headers: ["Atributo", "Valor recomendado", "Razón"], rows: [["Connection Load Balancing Goal", "LONG", "Las sesiones batch largas se balancean mejor por conteo de sesiones."], ["Runtime Load Balancing Goal", "NONE", "Las cargas batch se enrutan explícitamente en lugar de usar objetivos RLB advisory."], ["Instancias preferred / available", "CDB011 / CDB012", "La carga normal batch permanece en una instancia, mientras la otra queda reservada para failover del servicio."], ["Failover Type", "NONE", "Los batch jobs son reiniciables y deben reejecutarse desde el scheduler o la aplicación después de una falla."]] }, references: [{ label: "Referencia de comandos SRVCTL service", url: refs.srvctl }, { label: "Workload management with services", url: refs.srvctlCluster }] },

          { id: "tns-aliases", title: "9. Revisão de Aliases TNS", kicker: "Arquivos de administração de rede", body: "Revisar os aliases TNS no diretório network admin específico do banco.", code: { type: "bash", label: "Revisão de aliases TNS", value: commands.tns }, extraCodes: [{ type: "text", label: "Valores padrão de tnsnames.ora", value: commands.tnsDefaults }] },
          { id: "default-service", title: "10. Revisão da Configuração do Serviço de Conexão Padrão", kicker: "Linha base do serviço de conexão", body: "Revisar a configuração do serviço de conexão padrão e comparar suas características atuais.", code: { type: "bash", label: "Configuração do serviço padrão", value: commands.defaultService }, expected: commands.defaultServiceOutput, table: { headers: ["Característica", "Valor", "Valores documentados pela Oracle"], rows: [["Failover type", "NONE", "NONE, SESSION, SELECT, TRANSACTION, AUTO"], ["Runtime Load Balancing Goal", "NONE", "NONE, SERVICE_TIME, THROUGHPUT"], ["Connection Load Balancing Goal", "LONG", "SHORT, LONG"]] }, notes: ["Esta saída mostra que o serviço PDB padrão CDB01_PDB01.paas.oracle.com está habilitado para o papel PRIMARY e mapeado para PDB01.", "Cardinality 2 com instâncias preferred CDB011,CDB012 significa que o serviço fica posicionado nas duas instâncias RAC durante operação normal; não há instâncias available listadas para posicionamento alternativo.", "Failover type NONE, failover method NONE, TAF policy NONE, Commit Outcome FALSE e Failover restore NONE significam que este serviço padrão não está configurado para TAF do lado servidor, Transaction Guard nem comportamento de replay estilo Application Continuity.", "Connection Load Balancing Goal LONG favorece balanceamento por contagem de sessões para conexões de maior duração, enquanto Runtime Load Balancing Goal NONE significa que o serviço não publica objetivos de runtime load balancing advisory como SERVICE_TIME ou THROUGHPUT."], references: [{ label: "Referência de comandos SRVCTL service", url: refs.srvctl }] },
          { id: "oltp", title: "11. Configuração OLTP Recomendada (Eficiente em Memória)", kicker: "Seção de melhores práticas", body: "Para a recomendação OLTP eficiente em memória deste guia, use estes valores.", collapsible: true, code: { type: "bash", label: "Modificação de serviço para failover OLTP", value: commands.oltpModify }, extraCodes: [{ type: "text", label: "Alias TNS recomendado para a camada de aplicação", value: commands.oltpTnsAlias }, { type: "sql", label: "Verificação da instância conectada com SQL*Plus", value: commands.oltpInstanceCheck }], table: { headers: ["Atributo", "Valor recomendado", "Valores documentados pela Oracle"], rows: [["Failover Type", "SESSION", "SRVCTL: NONE, SESSION, SELECT, TRANSACTION, AUTO; TNS FAILOVER_MODE TYPE: session, select, none"], ["Failover Retries", "30", "Quantidade inteira de tentativas"], ["Failover Delay", "5", "Atraso inteiro em segundos"]] }, notes: ["O Oracle AI Database 26ai deprecia a opção SRVCTL -failovermethod, então o SRVCTL avisa que ela será ignorada. Remova -failovermethod dos scripts de modificação de serviço.", "Para failover de sessão estilo TAF, mantenha -failovertype SESSION com valores de retry e delay. Para clientes e pools com capacidade de replay, prefira Transparent Application Continuity ou Application Continuity, que usam -failovertype AUTO ou TRANSACTION com commit outcome e parâmetros de replay."], references: [{ label: "Referência de comandos SRVCTL service", url: refs.srvctl }, { label: "Parâmetros SRVCTL depreciados", url: refs.srvctlCluster }, { label: "Application Continuity", url: refs.appContinuity }, { label: "Parâmetros Oracle Net FAILOVER_MODE", url: refs.failoverMode }] },
          { id: "rlb", title: "12. Configuração OLTP Recomendada para Runtime Load Balancing", kicker: "Balanceamento runtime", body: "Habilitar runtime load balancing no serviço existente CDB01_PDB01.paas.oracle.com para que pools integrados possam rotear novo trabalho para a instância RAC com melhor throughput atual. Isso mantém o mesmo nome de serviço e evita a sobrecarga operacional de um serviço adicional, enquanto o impacto de CPU e memória do lado do banco é mínimo porque a mudança usa metadata de RAC service advisory em vez de iniciar processos adicionais de banco de dados. O benefício é melhor uso das duas instâncias, menos sessões presas a um nó mais lento e resposta mais uniforme sob condições variáveis de carga.", collapsible: true, code: { type: "bash", label: "Aplicar atualização de serviço para runtime load balancing", value: commands.oltpRlbModify }, extraCodes: [{ type: "bash", label: "Validar configuração atualizada do serviço", value: commands.oltpRlbVerify }, { type: "sql", label: "Verificar configuração do serviço em GV$SERVICES", value: commands.rlbServiceSettingsSql }, { type: "sql", label: "Verificação da instância conectada com SQL*Plus", value: commands.rlbInstanceCheck }], notes: ["Esta mudança mantém o SERVICE_NAME existente, então clientes de aplicação podem continuar usando CDB01_PDB01.paas.oracle.com.", "Execute o comando de validação depois do comando modify para confirmar que o SRVCTL reporta Connection Load Balancing Goal SHORT e Runtime Load Balancing Goal THROUGHPUT para o serviço.", "Use a consulta GV$SERVICES a partir de uma conta DBA ou de monitoramento para confirmar linhas por instância onde CLB_GOAL é SHORT e GOAL é THROUGHPUT dentro do banco de dados.", "Não é necessário um alias separado da camada de aplicação para esta seção. Runtime load balancing é controlado por atributos do serviço, então aliases existentes da seção 9 ou seção 11 que resolvem para CDB01_PDB01.paas.oracle.com herdam o comportamento atualizado do serviço.", "Comparada ao alias OLTP da seção 11, a sintaxe de conexão pode permanecer mais simples aqui porque runtime load balancing é controlado pela configuração do serviço e advisories de pools integrados, não pela inclusão de um bloco FAILOVER_MODE do lado cliente no descritor TNS.", "Connection Load Balancing Goal SHORT é o objetivo de conexão recomendado para pools integrados que usam advisories de runtime load balancing.", "Runtime Load Balancing Goal THROUGHPUT roteia trabalho para a instância que conclui trabalho na taxa mais alta. Use SERVICE_TIME quando o principal objetivo for tempo de resposta de transações OLTP curtas; use connection balancing LONG principalmente para cargas fechadas ou estilo batch."], table: { headers: ["Atributo", "Valor recomendado", "Valor padrão", "Valores documentados pela Oracle"], rows: [["Connection Load Balancing Goal", "SHORT", "LONG", "SHORT, LONG"], ["Runtime Load Balancing Goal", "THROUGHPUT", "NONE", "NONE, SERVICE_TIME, THROUGHPUT"]] }, references: [{ label: "Referência de comandos SRVCTL service", url: refs.srvctl }, { label: "Run-time connection load balancing", url: refs.rlb }, { label: "Referência GV$SERVICES", url: refs.gvservices }] },
          { id: "report-service", title: "13. Isolamento de Serviço para Relatórios", kicker: "Serviço dedicado para cargas de relatórios", body: "Criar um serviço separado para sessões de relatórios de leitura intensiva e longa duração e preferi-lo em uma única instância RAC. Fixar a rota normal de relatórios em uma instância preferred mantém varreduras grandes, ordenações, uso de espaço temporário e churn de buffer cache longe da instância voltada a OLTP, enquanto a segunda instância permanece disponível se o nó preferred ou o posicionamento do serviço falhar. Este é um padrão de isolamento de carga, não um limite de capacidade: a instância available preserva a disponibilidade do serviço, mas a carga diária de relatórios permanece previsível e mais fácil de medir com métricas AWR por serviço.", collapsible: true, code: { type: "bash", label: "Criação e validação do serviço de relatórios", value: commands.reportsService }, extraCodes: [{ type: "text", label: "Alias TNS da camada de aplicação para relatórios", value: commands.reportsTnsAlias }, { type: "sql", label: "Verificação da instância conectada com SQL*Plus", value: commands.reportsInstanceCheck }], notes: ["Use nomes de instância de banco em -preferred e -available. Este exemplo envia a carga normal de relatórios para CDB012 e mantém CDB011 disponível apenas quando o serviço de relatórios não puder executar na instância preferred.", "Manter relatórios em uma instância preferred reduz churn de cache entre nós e protege o serviço OLTP de varreduras ou agregações grandes de relatórios. Se o nó preferred de relatórios falhar, o Oracle Clusterware pode iniciar o serviço na instância available para que usuários mantenham um endpoint de serviço.", "O alias TNS de relatórios é intencionalmente mais simples que o alias OLTP da seção 11. Ele omite o bloco FAILOVER_MODE do lado cliente porque este serviço de relatórios usa posicionamento explícito do serviço e comportamento de carga reiniciável em vez de failover de sessão estilo TAF.", "Connection Load Balancing Goal LONG é apropriado para sessões de relatórios que tendem a ser longas e devem ser balanceadas por contagem de sessões em vez de feedback runtime advisory.", "Runtime Load Balancing Goal NONE evita publicar objetivos runtime advisory para cargas de relatórios. Mantenha o roteamento de relatórios explícito para que varreduras ou agregações grandes não concorram diretamente com o serviço OLTP.", "Failover Type NONE é intencional para relatórios porque essa carga normalmente é reiniciável. Se um nó falhar durante um relatório, a aplicação ou ferramenta de relatórios deve reexecutar a consulta ou job em vez de tentar continuar uma instrução longa parcialmente executada."], table: { headers: ["Atributo", "Valor recomendado", "Razão"], rows: [["Connection Load Balancing Goal", "LONG", "Sessões longas de relatórios são melhor balanceadas por contagem de sessões."], ["Runtime Load Balancing Goal", "NONE", "Cargas de relatórios são roteadas explicitamente em vez de usar objetivos RLB advisory."], ["Instâncias preferred / available", "CDB012 / CDB011", "A carga normal de relatórios permanece em uma instância, enquanto a outra fica reservada para failover do serviço."], ["Failover Type", "NONE", "Relatórios são reiniciáveis e devem ser reexecutados pela aplicação ou camada de relatórios após uma falha."]] }, references: [{ label: "Referência de comandos SRVCTL service", url: refs.srvctl }, { label: "Workload management with services", url: refs.srvctlCluster }] },
          { id: "batch-jobs", title: "14. Isolamento de Serviço para Batch Jobs", kicker: "Serviço dedicado para cargas batch", body: "Criar um serviço batch separado para jobs programados e reiniciáveis e preferi-lo em uma única instância RAC. Fixar a rota normal de batch em CDB011 mantém ETL, manutenção e processamento em segundo plano longe da rota do serviço voltado a OLTP, enquanto CDB012 permanece disponível se o nó batch preferred ou o posicionamento do serviço falhar. Este é um padrão de isolamento de carga, não um limite de capacidade: a carga batch permanece previsível durante janelas normais, e a instância available preserva a disponibilidade do serviço sem fazer cada passo batch em execução depender de failover de sessão.", collapsible: true, code: { type: "bash", label: "Criação e validação do serviço batch", value: commands.batchService }, extraCodes: [{ type: "text", label: "Alias TNS da camada de aplicação para batch jobs", value: commands.batchTnsAlias }], notes: ["Use nomes de instância de banco em -preferred e -available. Este exemplo envia a carga normal batch para CDB011 e mantém CDB012 disponível apenas quando o serviço batch não puder executar na instância preferred.", "Manter batch jobs em uma instância preferred reduz churn de cache entre nós e facilita medir a carga programada com métricas AWR por serviço. Se o nó preferred de batch falhar, o Oracle Clusterware pode iniciar o serviço na instância available para que o scheduler mantenha um endpoint de serviço.", "Connection Load Balancing Goal LONG é apropriado para sessões batch que tendem a ser longas e devem ser balanceadas por contagem de sessões em vez de feedback runtime advisory.", "Runtime Load Balancing Goal NONE mantém o roteamento batch explícito para que jobs grandes não concorram diretamente com decisões de runtime load balancing de OLTP.", "Failover Type NONE é intencional para batch jobs porque essa carga normalmente é reiniciável. Se um nó falhar durante um passo batch, o scheduler ou a aplicação deve reexecutar o passo do job em vez de tentar continuar uma instrução longa parcialmente executada."], table: { headers: ["Atributo", "Valor recomendado", "Razão"], rows: [["Connection Load Balancing Goal", "LONG", "Sessões batch longas são melhor balanceadas por contagem de sessões."], ["Runtime Load Balancing Goal", "NONE", "Cargas batch são roteadas explicitamente em vez de usar objetivos RLB advisory."], ["Instâncias preferred / available", "CDB011 / CDB012", "A carga normal batch permanece em uma instância, enquanto a outra fica reservada para failover do serviço."], ["Failover Type", "NONE", "Batch jobs são reiniciáveis e devem ser reexecutados pelo scheduler ou pela aplicação após uma falha."]] }, references: [{ label: "Referência de comandos SRVCTL service", url: refs.srvctl }, { label: "Workload management with services", url: refs.srvctlCluster }] },
          { id: "operational-notes", title: "Notas Operacionais Exascale", kicker: "Contexto de execução", body: "Mantenha consistente o contexto de usuário, o nome do banco e a substituição de nó durante toda a revisão.", bullets: ["Comandos de Grid como usuário grid.", "Comandos de banco como usuário oracle.", "Usar $ORACLE_UNQNAME.", "Substituir <node_name> por valores de olsnodes."] }
        ],
        calloutsTitle: "Conceitos de Continuidade e Serviços",

        callouts: [

    function CodePanel({ block, controls }) {
      const [copied, setCopied] = useState(false);
      const palette = {
        bash: "border-emerald-500/35 bg-[#111917]",
        java: "border-amber-500/35 bg-[#17130d]",

        diagram: "border-orange-400/35 bg-[#191511]"
      };

      function legacyCopy(text) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.top = "0";
        textarea.style.left = "0";
        textarea.style.width = "1px";
        textarea.style.height = "1px";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        let ok = false;
        try {
          ok = document.execCommand("copy");
        } finally {
          document.body.removeChild(textarea);
        }
        return ok;
      }

      async function copyCode() {
        let ok = false;
        if (navigator.clipboard && navigator.clipboard.writeText && window.isSecureContext) {
          try {
            await navigator.clipboard.writeText(block.value);
            ok = true;
          } catch (error) {
            ok = false;
          }
        }
        if (!ok) {
          ok = legacyCopy(block.value);
        }
        setCopied(ok);
        if (ok) {
          window.setTimeout(() => setCopied(false), 1500);
        }
      }

      return (
        <figure className={cx("overflow-hidden rounded-lg border shadow-sm", palette[block.type] || palette.text)}>
          <div className="flex items-center justify-between gap-4 border-b border-white/10 px-4 py-2">
            <figcaption className="text-xs font-semibold uppercase tracking-wide text-stone-200">
              {block.label || controls.command}
            </figcaption>
            <button
              type="button"
              onClick={copyCode}
              className="rounded-md border border-white/15 bg-white/10 px-3 py-1 text-xs font-semibold text-white transition hover:bg-white/18 focus:outline-none focus:ring-2 focus:ring-white/60"
              aria-label={`${controls.copy}: ${block.label || controls.command}`}
            >
              {copied ? controls.copied : controls.copy}
            </button>
          </div>
          <pre className="code-scroll overflow-x-auto p-4 text-[13px] leading-6 text-stone-100"><code>{block.value}</code></pre>
        </figure>
      );
    }

    function ReferenceLinks({ links, controls }) {
      if (!links || !links.length) return null;

      return (
        <div className="rounded-lg border border-stone-200 bg-stone-50 p-4 dark:border-stone-700 dark:bg-stone-900/45">
          <p className="text-sm font-semibold text-stone-950 dark:text-stone-100">{controls.oracleDocs}</p>
          <div className="mt-3 flex flex-wrap gap-2">
            {links.map((link) => (
              <a
                key={link.url}
                href={link.url}
                target="_blank"
                rel="noreferrer"
                className="rounded-md border border-oracle-red/30 bg-white px-3 py-2 text-sm font-semibold text-oracle-red underline-offset-4 hover:underline dark:border-orange-300/30 dark:bg-[#211d1b] dark:text-orange-300"
              >
                {link.label}
              </a>
            ))}
          </div>
        </div>
      );
    }

    function Disclaimer(props) {
      const title = props.title;
      const text = props.text;
      const compact = Boolean(props.compact);

      return (
        <aside className={cx(
          "rounded-lg border border-amber-300 bg-amber-50 text-amber-950 dark:border-amber-500/40 dark:bg-amber-950/25 dark:text-amber-100",
          compact ? "p-4 text-left" : "p-5"
        )}>
          <p className="text-sm font-bold uppercase tracking-[0.14em]">{title}</p>
          <p className="mt-2 text-sm leading-6">{text}</p>
        </aside>
      );
    }

    function DataTable({ table }) {
      return (
        <div className="overflow-x-auto rounded-lg border border-stone-200 bg-white dark:border-stone-700 dark:bg-[#211d1b]">
          <table className="min-w-[720px] border-collapse text-left text-sm">
            <thead className="bg-stone-100 text-stone-700 dark:bg-stone-800 dark:text-stone-200">
              <tr>
                {table.headers.map((header) => (
                  <th key={header} scope="col" className="px-4 py-3 font-semibold">{header}</th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y divide-stone-200 dark:divide-stone-700">
              {table.rows.map((row) => (
                <tr key={row.join("-")} className="hover:bg-stone-50 dark:hover:bg-stone-800/70">
                  {row.map((cell, index) => (
                    <td key={cell} className={cx("px-4 py-3 align-top", index === 0 && "font-medium text-stone-900 dark:text-stone-100")}>
                      <code className={index === 1 ? "rounded bg-stone-100 px-2 py-1 text-xs font-semibold text-oracle-deep dark:bg-stone-800 dark:text-orange-200" : ""}>{cell}</code>
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function ArticleSection({ section, controls }) {
      const content = (
        <div className="space-y-5">
          <div className="space-y-2">
            <p className="text-xs font-semibold uppercase tracking-[0.16em] text-oracle-red dark:text-orange-300">{section.kicker}</p>
            <h2 className="text-2xl font-bold tracking-tight text-stone-950 dark:text-white sm:text-3xl">{section.title}</h2>
            <p className="max-w-3xl text-base leading-7 text-stone-700 dark:text-stone-300">{section.body}</p>
          </div>
          {section.bullets && (
            <ul className="grid gap-3 sm:grid-cols-2">
              {section.bullets.map((bullet) => (
                <li key={bullet} className="rounded-lg border border-stone-200 bg-stone-50 px-4 py-3 text-sm text-stone-700 dark:border-stone-700 dark:bg-stone-900/45 dark:text-stone-300">
                  {bullet}
                </li>
              ))}
            </ul>
          )}
          {section.code && <CodePanel block={section.code} controls={controls} />}
          {section.extraCodes && section.extraCodes.map((block) => (
            <CodePanel key={`${section.id}-${block.label}`} block={block} controls={controls} />
          ))}
          <ReferenceLinks links={section.references} controls={controls} />
          {section.expected && (
            <div className="space-y-2">
              <p className="text-sm font-semibold text-stone-700 dark:text-stone-200">{controls.expected}</p>
              <CodePanel block={{ type: "text", label: controls.expected, value: section.expected }} controls={controls} />
            </div>
          )}
          {section.table && <DataTable table={section.table} />}
          {section.notes && (
            <div className="rounded-lg border-l-4 border-oracle-red bg-red-50 px-4 py-3 text-sm text-stone-700 dark:border-orange-300 dark:bg-orange-950/20 dark:text-stone-300">
              <p className="mb-2 font-semibold text-stone-950 dark:text-stone-100">{controls.notes}</p>
              <ul className="list-disc space-y-1 pl-5">
                {section.notes.map((note) => <li key={note}>{note}</li>)}
              </ul>
            </div>
          )}
        </div>
      );

      return (
        <section id={section.id} className="border-t border-stone-200 py-10 dark:border-stone-800">
          {section.collapsible ? (
            <details open className="group">
              <summary className="cursor-pointer list-none rounded-lg outline-none focus:ring-2 focus:ring-oracle-red/50">
                <div className="flex items-start justify-between gap-4">
                  <div>
                    <p className="text-xs font-semibold uppercase tracking-[0.16em] text-oracle-red dark:text-orange-300">{section.kicker}</p>
                    <h2 className="mt-2 text-2xl font-bold tracking-tight text-stone-950 dark:text-white sm:text-3xl">{section.title}</h2>
                  </div>
                  <span className="mt-2 rounded-md border border-stone-300 px-3 py-1 text-sm font-semibold text-stone-600 group-open:hidden dark:border-stone-700 dark:text-stone-300">+</span>
                  <span className="mt-2 hidden rounded-md border border-stone-300 px-3 py-1 text-sm font-semibold text-stone-600 group-open:block dark:border-stone-700 dark:text-stone-300">-</span>
                </div>
              </summary>
              <div className="mt-4 space-y-5">
                <p className="max-w-3xl text-base leading-7 text-stone-700 dark:text-stone-300">{section.body}</p>
                {section.code && <CodePanel block={section.code} controls={controls} />}
                {section.extraCodes && section.extraCodes.map((block) => (
                  <CodePanel key={`${section.id}-${block.label}`} block={block} controls={controls} />
                ))}
                <ReferenceLinks links={section.references} controls={controls} />
                {section.table && <DataTable table={section.table} />}
                {section.notes && (
                  <div className="rounded-lg border-l-4 border-oracle-red bg-red-50 px-4 py-3 text-sm text-stone-700 dark:border-orange-300 dark:bg-orange-950/20 dark:text-stone-300">
                    <p className="mb-2 font-semibold text-stone-950 dark:text-stone-100">{controls.notes}</p>
                    <ul className="list-disc space-y-1 pl-5">
                      {section.notes.map((note) => <li key={note}>{note}</li>)}
                    </ul>
                  </div>
                )}
              </div>
            </details>
          ) : content}
        </section>
      );
    }

    function App() {
      const [lang, setLang] = useState("en");
      const [dark, setDark] = useState(() => document.documentElement.classList.contains("dark"));
      const t = article[lang];

      useEffect(() => {
        document.documentElement.lang = lang;
      }, [lang]);

      useEffect(() => {
        document.documentElement.classList.toggle("dark", dark);
        localStorage.setItem("exascale-theme", dark ? "dark" : "light");
      }, [dark]);

      const toc = useMemo(() => [
        ...t.sections.map(({ id, title }) => ({ id, title })),
        { id: "concepts", title: t.calloutsTitle },
        { id: "glossary", title: t.glossaryTitle }
      ], [t]);

      return (
        <div className="min-h-screen">
          <header id="top" className="article-gradient border-b border-stone-200 dark:border-stone-800">
            <div className="mx-auto max-w-7xl px-5 py-6 sm:px-8">
              <nav className="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between" aria-label="Page controls">
                <div className="flex items-center gap-3">
                  <div className="h-9 w-9 rounded-md bg-oracle-red shadow-sm" aria-hidden="true"></div>
                  <div>
                    <p className="text-sm font-semibold text-stone-900 dark:text-white">Oracle Exadata Exascale</p>
                    <p className="text-xs text-stone-600 dark:text-stone-400">26ai RAC Health Check</p>
                  </div>
                </div>
                <div className="flex flex-wrap items-center gap-2">
                  <span className="sr-only">{t.controls.language}</span>
                  <div className="flex rounded-lg border border-stone-300 bg-white p-1 shadow-sm dark:border-stone-700 dark:bg-stone-900">
                    {Object.entries(article).map(([key, value]) => (
                      <button
                        key={key}
                        type="button"
                        onClick={() => setLang(key)}
                        className={cx(
                          "rounded-md px-3 py-1.5 text-sm font-semibold transition focus:outline-none focus:ring-2 focus:ring-oracle-red/60",
                          lang === key ? "bg-oracle-red text-white" : "text-stone-700 hover:bg-stone-100 dark:text-stone-300 dark:hover:bg-stone-800"
                        )}
                        aria-pressed={lang === key}
                      >
                        {value.label}
                      </button>
                    ))}
                  </div>
                  <button
                    type="button"
                    onClick={() => setDark((value) => !value)}
                    className="rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm font-semibold text-stone-700 shadow-sm transition hover:bg-stone-100 focus:outline-none focus:ring-2 focus:ring-oracle-red/60 dark:border-stone-700 dark:bg-stone-900 dark:text-stone-200 dark:hover:bg-stone-800"
                    aria-pressed={dark}
                  >
                    {dark ? t.controls.themeLight : t.controls.themeDark}
                  </button>
                </div>
              </nav>

              <div className="grid gap-5 py-6 sm:gap-6 sm:py-10 lg:grid-cols-[minmax(0,1fr)_360px] lg:items-end lg:gap-8 lg:py-12">
                <div className="max-w-4xl">
                  <p className="text-sm font-semibold uppercase tracking-[0.18em] text-oracle-red dark:text-orange-300">{t.eyebrow}</p>
                  <h1 className="mt-4 text-3xl font-bold leading-tight tracking-tight text-stone-950 dark:text-white sm:text-5xl lg:text-6xl">{t.title}</h1>
                  <p className="mt-4 max-w-3xl text-base leading-7 text-stone-700 dark:text-stone-300 sm:text-lg sm:leading-8">{t.subtitle}</p>
                  <div className="mt-5 flex min-w-0 flex-wrap gap-3 text-sm text-stone-600 dark:text-stone-400">
                    <span className="max-w-full rounded-md border border-stone-300 bg-white px-3 py-1.5 break-words dark:border-stone-700 dark:bg-stone-900">{t.updated}</span>
                  </div>
                  <div className="mt-5 max-w-3xl">
                    <Disclaimer title={t.disclaimerTitle} text={t.disclaimer} />
                  </div>
                </div>
                <aside className="rounded-lg border border-stone-200 bg-white p-4 shadow-subtle dark:border-stone-700 dark:bg-[#211d1b] sm:p-5">
                  <h2 className="text-sm font-bold uppercase tracking-[0.16em] text-stone-500 dark:text-stone-400">{t.controls.highlights}</h2>
                  <ul className="mt-3 space-y-1.5 sm:mt-4 sm:space-y-3">
                    {t.highlights.map((item) => (
                      <li key={item} className="flex gap-3 text-sm leading-5 text-stone-700 dark:text-stone-300 sm:leading-6">
                        <span className="mt-2 h-2 w-2 flex-none rounded-full bg-oracle-red" aria-hidden="true"></span>
                        <span>{item}</span>
                      </li>
                    ))}
                  </ul>
                </aside>
              </div>
            </div>
          </header>

          <div className="sticky top-0 z-30 border-b border-stone-200 bg-white/95 backdrop-blur lg:hidden dark:border-stone-800 dark:bg-[#171412]/95">
            <nav className="mx-auto flex max-w-7xl gap-2 overflow-x-auto px-5 py-3" aria-label={t.controls.toc}>
              {toc.map((item) => (
                <a key={item.id} href={`#${item.id}`} className="whitespace-nowrap rounded-md border border-stone-200 px-3 py-1.5 text-sm font-medium text-stone-700 dark:border-stone-700 dark:text-stone-300">
                  {item.title.replace(/^\d+\.\s*/, "")}
                </a>
              ))}
            </nav>
          </div>

          <main className="mx-auto grid max-w-7xl gap-8 px-5 py-8 sm:px-8 lg:grid-cols-[280px_minmax(0,1fr)] lg:py-12">
            <aside className="hidden lg:block">
              <div className="sticky top-6 rounded-lg border border-stone-200 bg-white p-4 shadow-sm dark:border-stone-800 dark:bg-[#211d1b]">
                <h2 className="text-xs font-bold uppercase tracking-[0.16em] text-stone-500 dark:text-stone-400">{t.controls.toc}</h2>
                <nav className="mt-4 space-y-1" aria-label={t.controls.toc}>
                  {toc.map((item) => (
                    <a key={item.id} href={`#${item.id}`} className="block rounded-md px-3 py-2 text-sm font-medium text-stone-700 transition hover:bg-stone-100 hover:text-oracle-red focus:outline-none focus:ring-2 focus:ring-oracle-red/40 dark:text-stone-300 dark:hover:bg-stone-800 dark:hover:text-orange-200">
                      {item.title}
                    </a>
                  ))}
                </nav>
              </div>
            </aside>

            <article className="min-w-0">
              {t.sections.map((section) => (
                <ArticleSection key={section.id} section={section} controls={t.controls} />
              ))}

              <section id="concepts" className="border-t border-stone-200 py-10 dark:border-stone-800">
                <div className="space-y-3">
                  <p className="text-xs font-semibold uppercase tracking-[0.16em] text-oracle-red dark:text-orange-300">RAC context</p>
                  <h2 className="text-2xl font-bold tracking-tight text-stone-950 dark:text-white sm:text-3xl">{t.calloutsTitle}</h2>
                  <p className="max-w-3xl text-base leading-7 text-stone-700 dark:text-stone-300">{t.calloutsIntro}</p>
                </div>
                <div className="mt-7 grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
                  {t.callouts.map((item) => (
                    <a key={item.id} href={item.ref} target="_blank" rel="noreferrer" className="group rounded-lg border border-stone-200 bg-white p-5 shadow-sm transition hover:-translate-y-0.5 hover:border-oracle-red/60 hover:shadow-subtle dark:border-stone-700 dark:bg-[#211d1b]">
                      <div className="flex items-center justify-between gap-3">
                        <span className="rounded-md bg-oracle-red px-3 py-1 text-lg font-black tracking-wide text-white">{item.term}</span>
                        <span className="text-xs font-semibold uppercase tracking-[0.16em] text-stone-400 group-hover:text-oracle-red dark:group-hover:text-orange-300">{t.controls.refs}</span>
                      </div>
                      <h3 className="mt-4 text-lg font-bold text-stone-950 dark:text-white">{item.name}</h3>
                      <p className="mt-2 text-sm leading-6 text-stone-700 dark:text-stone-300">{item.text}</p>
                    </a>
                  ))}
                </div>
              </section>

              <section id="glossary" className="border-t border-stone-200 py-10 dark:border-stone-800">
                <div className="space-y-3">
                  <p className="text-xs font-semibold uppercase tracking-[0.16em] text-oracle-red dark:text-orange-300">{t.controls.refs}</p>
                  <h2 className="text-2xl font-bold tracking-tight text-stone-950 dark:text-white sm:text-3xl">{t.glossaryTitle}</h2>
                  <p className="max-w-3xl text-base leading-7 text-stone-700 dark:text-stone-300">{t.glossaryIntro}</p>
                </div>
                <div className="mt-7 grid gap-4 md:grid-cols-2">
                  {t.glossary.map((entry) => (
                    <div key={entry.term} className="rounded-lg border border-stone-200 bg-white p-5 dark:border-stone-700 dark:bg-[#211d1b]">
                      <h3 className="text-base font-bold text-stone-950 dark:text-white">{entry.term}</h3>
                      <p className="mt-2 text-sm leading-6 text-stone-700 dark:text-stone-300">{entry.text}</p>
                      <a href={entry.ref} target="_blank" rel="noreferrer" className="mt-3 inline-flex rounded-md text-sm font-semibold text-oracle-red underline-offset-4 hover:underline dark:text-orange-300">
                        {t.controls.refs}
                      </a>
                    </div>
                  ))}
                </div>
              </section>
            </article>
          </main>

          <footer className="border-t border-stone-200 bg-stone-50 px-5 py-8 text-center text-sm text-stone-600 dark:border-stone-800 dark:bg-[#12100f] dark:text-stone-400">
            <div className="mx-auto max-w-4xl">
              <Disclaimer title={t.disclaimerTitle} text={t.disclaimer} compact />
              <p className="mt-5">{t.updated}</p>
            </div>
          </footer>

          <button
            type="button"
            onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
            className="fixed bottom-5 right-5 rounded-lg border border-stone-300 bg-white px-4 py-3 text-sm font-bold text-stone-800 shadow-subtle transition hover:border-oracle-red hover:text-oracle-red focus:outline-none focus:ring-2 focus:ring-oracle-red/50 dark:border-stone-700 dark:bg-stone-900 dark:text-stone-100 dark:hover:text-orange-300"
          >
            {t.controls.backTop}
          </button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
