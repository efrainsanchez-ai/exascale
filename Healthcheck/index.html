column inst_id format 999
column pdb_name format a30
column network_name format a45
column sessions format 999999

SELECT s.inst_id,
       p.name pdb_name,
       svc.network_name,
       COUNT(*) sessions
FROM gv$session s
JOIN v$containers p
  ON s.con_id=p.con_id
JOIN gv$services svc
  ON svc.inst_id=s.inst_id
 AND svc.con_id=s.con_id
 AND svc.name=s.service_name
WHERE s.type='USER'
GROUP BY s.inst_id,p.name,svc.network_name
ORDER BY p.name,svc.network_name,s.inst_id;`,
      memoryPerPdbInstance: `set linesize 180
column inst_id format 999
column pdb_name format a30
column pga_mb format 999999990.99

    c.name pdb_name,
    ROUND(SUM(p.pga_alloc_mem)/1024/1024,2) pga_mb,
    COUNT(*) sessions
FROM gv$session s
JOIN gv$process p
  ON s.inst_id=p.inst_id

column inst_id format 999
column pdb_name format a30
column sessions format 999999
column total_pga_mb format 999999990.99
column avg_pga_mb_per_session format 999999990.99

SELECT
    s.inst_id,
    c.name pdb_name,
    COUNT(*) sessions,
    ROUND(SUM(p.pga_alloc_mem)/1024/1024,2) total_pga_mb,
    ROUND(SUM(p.pga_alloc_mem)/COUNT(*)/1024/1024,2) avg_pga_mb_per_session

          { term: "Preferred and available service instances", text: "RAC service placement lists used to run a service on preferred instances and reserve available instances for failover.", ref: refs.srvctl },
          { term: "Updated OLTP service", text: "The existing CDB01_PDB01.paas.oracle.com service after applying SHORT connection load balancing and THROUGHPUT runtime load balancing in this guide.", ref: refs.srvctl },

          { term: "RLB", text: "Runtime Load Balancing, configured with service goals and a SHORT connection balancing goal for supported pools.", ref: refs.rlb },

        disclaimer: "Este contenido es solo para fines educativos y de planeación. Aplica cada comando y configuración primero en un ambiente de prueba no productivo que refleje tus requisitos de RAC, servicios, drivers cliente, carga de trabajo y failover. Los valores recomendados aquí podrían no funcionar en tu entorno específico, pueden requerir aprobación de change-control y pueden afectar disponibilidad, enrutamiento de conexiones, comportamiento transaccional, uso de memoria y ubicación de cargas batch. Valida con dueños de aplicación, DBAs, equipos de red y la guía de Oracle Support antes de usar cualquier ajuste en producción.",

        highlights: [

          "El aislamiento de reportes crea CDB01_PDB01_REPORTS.paas.oracle.com con connection balancing LONG en la instancia RAC preferida para reportes.",

        ],
        sections: [
          { id: "overview", title: "Overview", kicker: "Propósito", body: "Un health check RAC es una revisión por capas de membresía de clúster, recursos administrados por Oracle, servicios de base de datos, naming cliente y colocación de cargas basada en servicios. Exadata Database Service on Exascale Infrastructure en OCI ofrece un despliegue Exadata cloud administrado por Oracle donde los equipos pueden comenzar con VM clusters más pequeños, escalar cómputo y almacenamiento conforme crecen las necesidades, mejorar eficiencia de almacenamiento, simplificar el aprovisionamiento y combinar el rendimiento de Exadata smart software con elasticidad cloud y economía basada en consumo.", notes: ["Ejecuta las secciones en orden durante una validación base o una revisión posterior a cambios."] },
          { id: "architecture", title: "Contexto de Arquitectura", kicker: "Mapa de alcance", body: "En Oracle Multitenant, la container database (CDB) es el contenedor raíz de base de datos que puede alojar múltiples pluggable databases (PDBs). Cada PDB tiene su propio servicio de conexión por defecto, por lo que las aplicaciones deben conectarse al servicio de la PDB en lugar de apuntar a una instancia RAC individual. Después, la disponibilidad de Oracle RAC depende de Clusterware, instancias de base de datos, servicios, listeners y descriptores de conexión cliente trabajando juntos. El mapa de arquitectura muestra esas dependencias y separa el comportamiento del servicio por defecto de los servicios dedicados para reportes y batch.", infographic: architectureInfographics.es },
          { id: "grid", title: "1. Health Checks de Grid Infrastructure", kicker: "Clusterware y nodos", body: "Oracle Clusterware proporciona el marco de recursos cluster-aware usado por RAC. CRSCTL es la interfaz de Clusterware para revisar salud del clúster, estado de recursos y membresía de nodos antes de comenzar revisiones de base de datos.", code: { type: "bash", label: "Ejecutar como grid", value: commands.grid }, notes: ["La guía fuente indica que olsnodes -i está deprecado."] },
          { id: "asm", title: "2. Verificaciones ASM (No Aplicable a Exascale)", kicker: "Expectativa de almacenamiento Exascale", body: "En la ruta Exadata Exascale usada por esta guía, el almacenamiento se presenta mediante infraestructura administrada por Exascale y no mediante instancias ASM administradas por el cliente. Un recurso ora.asm ausente es una característica esperada, no necesariamente una falla.", code: { type: "bash", label: "Verificación de estado ASM", value: commands.asm }, expected: commands.asmExpected },
          { id: "listener", title: "3. Health Checks de Listener", kicker: "Listener de nodo", body: "Los listeners de Oracle Net reciben solicitudes de conexión cliente y las enrutan a servicios de base de datos registrados. En RAC, la salud del listener forma parte de la ruta entre direcciones SCAN o de nodo y el servicio elegido por el cliente.", code: { type: "bash", label: "Estado del listener", value: commands.listener }, notes: ["Reemplaza <node_name> con valores devueltos por olsnodes."] },
          { id: "database-health", title: "4. Health Checks de Base de Datos", kicker: "Contexto del propietario de base de datos", body: "SRVCTL es la utilidad de administración esperada para entidades RAC administradas por Oracle como bases de datos, instancias, listeners y servicios. La revisión de estado confirma si cada instancia RAC está ejecutándose bajo control de Clusterware.", code: { type: "bash", label: "Estado de base de datos", value: commands.database } },
          { id: "database-config", title: "5. Configuración de Base de Datos", kicker: "Configuración registrada", body: "La configuración de base de datos es la metadata de Clusterware que describe cómo se administra la base RAC, incluyendo nombres de instancia, Oracle homes, política de arranque e información de colocación usada por SRVCTL.", code: { type: "bash", label: "Configuración de base de datos", value: commands.dbConfig } },
          { id: "service-validation", title: "6. Validación de Servicios", kicker: "Configuración y ejecución de servicios", body: "Los servicios RAC son puntos lógicos de entrada para cargas de trabajo. Separan los nombres de conexión de aplicación de instancias individuales y contienen atributos de colocación, failover y load balancing usados por clientes y pools.", code: { type: "bash", label: "Validación de servicios", value: commands.service } },
          { id: "sql-health", title: "7. Health Checks SQL", kicker: "Vistas dinámicas", body: "Las vistas dinámicas de rendimiento exponen estado actual de la base y de las instancias. En RAC, las vistas GV$ devuelven filas por instancia para comparar estado, servicios y sesiones entre nodos.", code: { type: "sql", label: "Inventario de vistas SQL", value: commands.sqlViews } },
          { id: "connectivity", title: "8. Validación de Conectividad", kicker: "TNS y SQL*Plus", body: "La validación de conectividad cubre resolución de nombres y creación de sesión. Un alias TNS puede resolver correctamente aunque la conexión final al servicio falle, por lo que ambas capas deben revisarse.", code: { type: "bash", label: "Validación de conectividad", value: commands.connectivity } },
          { id: "tns-aliases", title: "9. Revisión de Alias TNS", kicker: "Archivos de administración de red", body: "Local naming usa alias de tnsnames.ora para mapear nombres amigables a connect descriptors. Esos descriptores definen direcciones, nombres de servicio, opciones de failover y comportamiento de load balancing visto por clientes.", code: { type: "bash", label: "Revisión de alias TNS", value: commands.tns }, extraCodes: [{ type: "text", label: "Valores por defecto de tnsnames.ora", value: commands.tnsDefaults }] },
{ id: "default-service", title: "10. Revisión de Configuración del Servicio de Conexión por Defecto", kicker: "Línea base del servicio de conexión", body: "El servicio PDB por defecto es la línea base de entrada de aplicación para este ambiente. Sus atributos SRVCTL muestran colocación, tipo de failover, objetivo de connection load balancing y objetivo de runtime load balancing antes de aplicar recomendaciones.", code: { type: "bash", label: "Configuración del servicio por defecto", value: commands.defaultService }, table: { headers: ["Característica", "Valor", "Valores documentados por Oracle"], rows: [["Failover type", "NONE", "NONE, SESSION, SELECT, TRANSACTION, AUTO"], ["Runtime Load Balancing Goal", "NONE", "NONE, SERVICE_TIME, THROUGHPUT"], ["Connection Load Balancing Goal", "LONG", "SHORT, LONG"]] }, notes: ["Esta salida muestra que el servicio PDB por defecto CDB01_PDB01.paas.oracle.com está habilitado para el rol PRIMARY y mapeado a PDB01.", "Cardinality 2 con instancias preferred CDB011,CDB012 significa que el servicio se ubica en ambas instancias RAC durante operación normal; no hay instancias available listadas para ubicación alterna.", "Failover type NONE, failover method NONE, TAF policy NONE, Commit Outcome FALSE y Failover restore NONE significan que este servicio por defecto no está configurado para TAF del lado servidor, Transaction Guard ni comportamiento de replay estilo Application Continuity.", "Connection Load Balancing Goal LONG favorece balanceo por conteo de sesiones para conexiones de mayor duración, mientras que Runtime Load Balancing Goal NONE significa que el servicio no publica objetivos de runtime load balancing advisory como SERVICE_TIME o THROUGHPUT."], postNoteCodes: [{ type: "text", label: "Salida del servicio por defecto", description: "Objetivo: revisar la salida SRVCTL capturada en las notas y enfocarse en los atributos de failover y balanceo de carga que definen el comportamiento del servicio por defecto.", value: commands.defaultServiceOutput, highlightPatterns: ["Failover type:", "Runtime Load Balancing Goal:", "Connection Load Balancing Goal:"] }], references: [{ label: "Referencia de comandos SRVCTL service", url: refs.srvctl }] },
          { id: "oltp", title: "11. Configuración OLTP Recomendada (Eficiente en Memoria)", kicker: "Sección de mejores prácticas", body: "Los servicios OLTP suelen priorizar transacciones cortas, comportamiento de reconexión predecible y bajo overhead operativo. Esta sección explica una configuración de failover de sesión que conserva el mismo nombre de servicio y evita crear servicios adicionales.", collapsible: true, code: { type: "bash", label: "Modificación de servicio para failover OLTP", value: commands.oltpModify }, afterCodeNotes: ["-failovertype SESSION cambia el servicio desde el valor por defecto capturado Failover type NONE hacia failover de sesión para clientes compatibles. Con NONE, el servicio no solicita failover de sesión estilo TAF; una pérdida de conexión se devuelve a la aplicación o al pool para su manejo. Con SESSION, el cliente puede reconectar a una instancia disponible y restaurar el contexto de sesión de base de datos, pero el trabajo en curso no se reproduce automáticamente.",
              "-failovertype SELECT es la opción TAF para continuidad de cursores de solo lectura. Para clientes OCI compatibles, SELECT puede permitir que una sesión con cursores abiertos siga haciendo fetch de filas después de reconectar en otra instancia, mientras SESSION solo recrea la sesión y no intenta recuperar operaciones select. SELECT agrega overhead del lado cliente durante el procesamiento normal de selects, por lo que conviene reservarlo para cargas que se benefician de continuar fetches largos. Con failover BASIC, el segundo nodo no mantiene sesiones backup preestablecidas; debe tener el servicio disponible y suficiente capacidad de CPU, memoria y procesos para aceptar reconexiones cuando ocurra el failover. El failover preconectado sería más rápido, pero asigna sesiones backup por adelantado y requiere que la instancia backup soporte esas conexiones adicionales."], extraCodes: [{ type: "text", label: "Alias TNS recomendado para la capa de aplicación", value: commands.oltpTnsAlias }], postNoteCodes: [{ type: "sql", label: "Verificación de instancia conectada con SQL*Plus", value: commands.oltpInstanceCheck }], postNoteText: ["La salida de SQL*Plus muestra la instancia RAC real y el nombre de servicio usado por la sesión conectada, lo que confirma dónde aterrizó el cliente después de resolver el alias OLTP."], table: { headers: ["Atributo", "Valor recomendado", "Valores documentados por Oracle"], rows: [["Failover Type", "SESSION", "SRVCTL: NONE, SESSION, SELECT, TRANSACTION, AUTO; TNS FAILOVER_MODE TYPE: session, select, none"], ["Failover Retries", "30", "Cantidad entera de reintentos"], ["Failover Delay", "5", "Demora entera en segundos"]] }, notes: ["Coloca LOAD_BALANCE=ON y FAILOVER=ON directamente bajo DESCRIPTION porque son opciones del connect descriptor. LOAD_BALANCE aleatoriza la ruta de direcciones cuando hay varias direcciones listener o SCAN disponibles, y FAILOVER permite que el cliente pruebe otra dirección si la elegida no está disponible durante el connect time.", "El alias omite UR=A en este ejemplo OLTP porque la conexión debe usar el registro normal de servicio y el ruteo del listener para CDB01_PDB01.paas.oracle.com."], postNoteReferences: [{ label: "Referencia de comandos SRVCTL service", url: refs.srvctl }, { label: "Parámetros SRVCTL deprecados", url: refs.srvctlCluster }, { label: "Application Continuity", url: refs.appContinuity }, { label: "Parámetros Oracle Net local naming", url: refs.tnsnames }, { label: "Parámetros Oracle Net FAILOVER_MODE", url: refs.failoverMode }] },
          { id: "report-service", title: "13. Aislamiento de Servicio para Reportes", kicker: "Servicio dedicado para cargas de reportes", body: "Las cargas de reportes suelen ser de lectura intensiva, más largas y más propensas a generar escaneos, ordenamientos, uso de espacio temporal y churn de buffer cache. Un servicio dedicado da a esa carga su propio nombre de servicio, política de colocación e identidad de monitoreo sin cambiar la PDB.", collapsible: true, code: { type: "bash", label: "Creación y validación del servicio de reportes", value: commands.reportsService }, extraCodes: [{ type: "text", label: "Alias TNS de capa de aplicación para reportes", value: commands.reportsTnsAlias }, { type: "sql", label: "Verificación de instancia conectada con SQL*Plus", value: commands.reportsInstanceCheck }], notes: ["Usa nombres de instancia de base de datos en -preferred y -available. Este ejemplo envía la carga normal de reportes a CDB012 y mantiene CDB011 disponible solo cuando el servicio de reportes no pueda ejecutarse en la instancia preferred.", "Mantener reportes en una instancia preferred reduce churn de cache entre nodos y protege el servicio OLTP de escaneos o agregaciones grandes de reportes. Si falla el nodo preferred de reportes, Oracle Clusterware puede iniciar el servicio en la instancia available para que los usuarios conserven un endpoint de servicio.", "El alias TNS de reportes es intencionalmente más simple que el alias OLTP de la sección 11. Omite el bloque FAILOVER_MODE del lado cliente porque este servicio de reportes usa colocación explícita del servicio y comportamiento de carga reiniciable en lugar de failover de sesión estilo TAF.", "Connection Load Balancing Goal LONG es apropiado para sesiones de reportes que tienden a ser largas y deben balancearse por conteo de sesiones en lugar de feedback runtime advisory.", "Runtime Load Balancing Goal NONE evita publicar objetivos runtime advisory para cargas de reportes. Mantén el ruteo de reportes explícito para que escaneos o agregaciones grandes no compitan directamente con el servicio OLTP.", "Failover Type NONE es intencional para reportes porque esta carga normalmente es reiniciable. Si un nodo falla durante un reporte, la aplicación o herramienta de reportes debe reejecutar la consulta o job en lugar de intentar continuar una sentencia larga ejecutada parcialmente."], table: { headers: ["Atributo", "Valor recomendado", "Razón"], rows: [["Connection Load Balancing Goal", "LONG", "Las sesiones largas de reportes se balancean mejor por conteo de sesiones."], ["Runtime Load Balancing Goal", "NONE", "Las cargas de reportes se enrutan explícitamente en lugar de usar objetivos RLB advisory."], ["Instancias preferred / available", "CDB012 / CDB011", "La carga normal de reportes permanece en una instancia, mientras la otra queda reservada para failover del servicio."], ["Failover Type", "NONE", "Los reportes son reiniciables y deben reejecutarse desde la aplicación o capa de reportes después de una falla."]] }, references: [{ label: "Referencia de comandos SRVCTL service", url: refs.srvctl }, { label: "Workload management with services", url: refs.srvctlCluster }] },
          { id: "batch-jobs", title: "14. Aislamiento de Servicios para Batch Jobs", kicker: "Servicio dedicado para cargas batch", body: "Los batch jobs suelen ser programados, consumir recursos y ser reiniciables. Un servicio batch dedicado da a los schedulers un endpoint estable para esta carga mientras separa su colocación normal y métricas de servicio del tráfico OLTP y de reportes.", collapsible: true, code: { type: "bash", label: "Creación y validación del servicio batch", value: commands.batchService }, extraCodes: [{ type: "text", label: "Alias TNS de capa de aplicación para batch jobs", value: commands.batchTnsAlias }], notes: ["Usa nombres de instancia de base de datos en -preferred y -available. Este ejemplo envía la carga normal batch a CDB011 y mantiene CDB012 disponible solo cuando el servicio batch no pueda ejecutarse en la instancia preferred.", "Mantener batch jobs en una instancia preferred reduce churn de cache entre nodos y facilita medir la carga programada con métricas AWR por servicio. Si falla el nodo preferred de batch, Oracle Clusterware puede iniciar el servicio en la instancia available para que el scheduler conserve un endpoint de servicio.", "Connection Load Balancing Goal LONG es apropiado para sesiones batch que tienden a ser largas y deben balancearse por conteo de sesiones en lugar de feedback runtime advisory.", "Runtime Load Balancing Goal NONE mantiene el ruteo batch explícito para que jobs grandes no compitan directamente con decisiones de runtime load balancing de OLTP.", "Failover Type NONE es intencional para batch jobs porque esta carga normalmente es reiniciable. Si un nodo falla durante un paso batch, el scheduler o la aplicación debe reejecutar el paso del job en lugar de intentar continuar una sentencia larga ejecutada parcialmente."], table: { headers: ["Atributo", "Valor recomendado", "Razón"], rows: [["Connection Load Balancing Goal", "LONG", "Las sesiones batch largas se balancean mejor por conteo de sesiones."], ["Runtime Load Balancing Goal", "NONE", "Las cargas batch se enrutan explícitamente en lugar de usar objetivos RLB advisory."], ["Instancias preferred / available", "CDB011 / CDB012", "La carga normal batch permanece en una instancia, mientras la otra queda reservada para failover del servicio."], ["Failover Type", "NONE", "Los batch jobs son reiniciables y deben reejecutarse desde el scheduler o la aplicación después de una falla."]] }, references: [{ label: "Referencia de comandos SRVCTL service", url: refs.srvctl }, { label: "Workload management with services", url: refs.srvctlCluster }] },
          { id: "session-memory", title: "15. Consultas de distribución de sesiones y memoria", kicker: "Validación de sesiones y memoria RAC", body: "La distribución de sesiones y memoria es la evidencia runtime de si la colocación de servicios funciona como se espera. GV$SESSION, GV$PROCESS, GV$SERVICES y metadata de contenedores permiten comparar carga conectada y uso de PGA por instancia, PDB y servicio.", collapsible: true, code: { type: "sql", label: "Sesiones por instancia", description: "Objetivo: obtener un conteo rápido de sesiones por instancia RAC. Úsalo como primera revisión de balance después de cambios de servicio o pruebas de failover para ver si una instancia concentra la mayor parte de la carga conectada.", value: commands.sessionsPerInstance }, extraCodes: [{ type: "sql", label: "Sesiones por PDB e instancia", description: "Objetivo: desglosar el conteo de sesiones por PDB, instancia RAC y nombre de servicio de conexión. Muestra qué endpoint de servicio coloca sesiones en cada instancia y ayuda a confirmar si conexiones OLTP, reportes o batch aterrizan donde se espera.", value: commands.sessionsPerPdbInstance }, { type: "sql", label: "Uso de memoria por PDB e instancia RAC", description: "Objetivo: estimar la memoria PGA asignada por sesiones de usuario para cada PDB en cada instancia RAC. Úsalo para detectar presión de memoria, colocación sesgada de servicios o una clase de carga que consume más memoria de procesos en un nodo.", value: commands.memoryPerPdbInstance }, { type: "sql", label: "Distribución de memoria en todo el clúster", description: "Objetivo: agregar el uso de PGA por PDB en toda la base RAC. Resalta qué PDB es el mayor consumidor de memoria sin importar la instancia y ayuda a priorizar análisis más profundo de sesiones o SQL.", value: commands.clusterMemoryDistribution }, { type: "sql", label: "Dashboard de carga de trabajo RAC", description: "Objetivo: combinar conteo de sesiones, PGA total y PGA promedio por sesión por PDB e instancia. Úsalo como dashboard compacto de carga para comparar volumen e intensidad de memoria entre nodos RAC antes y después de cambios de configuración de servicios.", value: commands.racWorkloadDashboard }], notes: ["Ejecuta estas consultas desde una cuenta DBA o de monitoreo con acceso a GV$SESSION, GV$PROCESS y V$CONTAINERS.", "Usa la salida después de cambios de servicio, pruebas de failover o cambios de aislamiento de carga para confirmar que las sesiones y la memoria PGA se distribuyen según lo esperado."], references: [{ label: "Vistas dinámicas de rendimiento", url: refs.dynamicViews }] },
          { id: "rlb", title: "16. Configuración OLTP Recomendada para Runtime Load Balancing", kicker: "Balanceo runtime", body: "Runtime load balancing es un mecanismo de service advisory consumido por pools de conexión integrados. Ayuda a que nuevas solicitudes prefieran la instancia que ofrece el mejor objetivo de servicio actual, pero el modelo de conexión de la aplicación debe ser compatible con ruteo basado en pool.", collapsible: true, code: { type: "bash", label: "Aplicar actualización de servicio para runtime load balancing", value: commands.oltpRlbModify }, extraCodes: [{ type: "bash", label: "Validar configuración actualizada del servicio", value: commands.oltpRlbVerify }, { type: "sql", label: "Verificar configuración del servicio desde GV$SERVICES", value: commands.rlbServiceSettingsSql }, { type: "sql", label: "Verificación de instancia conectada con SQL*Plus", value: commands.rlbInstanceCheck }], notes: ["Este cambio mantiene el SERVICE_NAME existente, por lo que los clientes de aplicación pueden seguir usando CDB01_PDB01.paas.oracle.com.", "Ejecuta el comando de validación después del comando modify para confirmar que SRVCTL reporta Connection Load Balancing Goal SHORT y Runtime Load Balancing Goal THROUGHPUT para el servicio.", "Usa la consulta GV$SERVICES desde una cuenta DBA o de monitoreo para confirmar filas por instancia donde CLB_GOAL es SHORT y GOAL es THROUGHPUT desde dentro de la base de datos.", "No se requiere un alias separado de capa de aplicación para esta sección. Runtime load balancing se controla mediante atributos del servicio, por lo que los alias existentes de la sección 9 o la sección 11 que resuelven a CDB01_PDB01.paas.oracle.com heredan el comportamiento actualizado del servicio.", "Comparado con el alias OLTP de la sección 11, la sintaxis de conexión puede mantenerse más simple aquí porque runtime load balancing se controla mediante la configuración del servicio y advisories de pools integrados, no agregando un bloque FAILOVER_MODE del lado cliente al descriptor TNS.", "Runtime load balancing funciona mejor para modelos de solicitud stateless donde las conexiones del pool se toman, se usan durante una solicitud corta y se devuelven al pool. Habilita Fast Connection Failover y usa pools UCP, WebLogic, OCI u ODP.NET que consumen eventos FAN y RAC load balancing advisory.", "Para aplicaciones stateful, revisa antes de habilitar THROUGHPUT globalmente. Conversaciones largas, package globals, tablas temporales, estado de sesión alterado, cursores abiertos o supuestos de afinidad pueden reducir el beneficio porque el pool no puede enrutar libremente cada nueva solicitud. Mueve el estado conversacional a la capa de aplicación o a una tabla, reinicia el estado de sesión al devolver conexiones al pool, marca límites de solicitud y valida la cobertura de Application Continuity o Transparent Application Continuity antes de depender de replay.", "Connection Load Balancing Goal SHORT es el objetivo de conexión recomendado para pools integrados que usan advisories de runtime load balancing.", "Runtime Load Balancing Goal THROUGHPUT enruta trabajo hacia la instancia que completa trabajo a la tasa más alta. Usa SERVICE_TIME cuando el objetivo principal sea el tiempo de respuesta de transacciones OLTP cortas; usa connection balancing LONG principalmente para cargas cerradas o estilo batch."], table: { headers: ["Atributo", "Valor recomendado", "Valor por defecto", "Valores documentados por Oracle"], rows: [["Connection Load Balancing Goal", "SHORT", "LONG", "SHORT, LONG"], ["Runtime Load Balancing Goal", "THROUGHPUT", "NONE", "NONE, SERVICE_TIME, THROUGHPUT"]] }, references: [{ label: "Referencia de comandos SRVCTL service", url: refs.srvctl }, { label: "Run-time connection load balancing", url: refs.rlb }, { label: "Fast Connection Failover", url: refs.fcf }, { label: "Application Continuity", url: refs.appContinuity }, { label: "Referencia GV$SERVICES", url: refs.gvservices }] },
          { id: "operational-notes", title: "Notas Operativas de Exascale", kicker: "Contexto de ejecución", body: "La consistencia operativa importa porque las revisiones RAC cruzan usuarios de sistema operativo, Oracle homes, variables de entorno, nombres de nodo y nombres de servicio. Mantener explícitas esas sustituciones reduce falsos hallazgos durante la validación posterior a cambios.", bullets: ["Comandos de Grid como usuario grid.", "Comandos de base de datos como usuario oracle.", "Usar $ORACLE_UNQNAME.", "Reemplazar <node_name> con valores de olsnodes."] }
        ],
        calloutsTitle: "Conceptos de Continuidad y Servicios",

          { id: "rac", term: "RAC", name: "Real Application Clusters", text: "Arquitectura de base de datos en cluster cuyas instancias, servicios y listeners se verifican en esta guía.", ref: refs.racListener },

        highlights: [
          "Runtime load balancing OLTP agora atualiza CDB01_PDB01.paas.oracle.com com connection load balancing SHORT e runtime load balancing THROUGHPUT.",
          "O isolamento de relatórios cria CDB01_PDB01_REPORTS.paas.oracle.com com connection balancing LONG na instância RAC preferida para relatórios.",

        ],
        sections: [
          { id: "overview", title: "Overview", kicker: "Propósito", body: "Um health check RAC é uma revisão em camadas de associação de cluster, recursos gerenciados pela Oracle, serviços de banco, naming cliente e posicionamento de carga baseado em serviços. Exadata Database Service on Exascale Infrastructure no OCI oferece uma implantação Exadata cloud gerenciada pela Oracle onde as equipes podem começar com VM clusters menores, escalar computação e armazenamento conforme a necessidade cresce, melhorar a eficiência de armazenamento, simplificar o provisionamento e combinar o desempenho do Exadata smart software com elasticidade cloud e economia baseada em consumo.", notes: ["Execute as seções em ordem durante uma validação base ou uma revisão após mudanças."] },
          { id: "architecture", title: "Contexto de Arquitetura", kicker: "Mapa de escopo", body: "No Oracle Multitenant, o container database (CDB) é o contêiner raiz de banco de dados que pode hospedar múltiplos pluggable databases (PDBs). Cada PDB tem seu próprio serviço de conexão padrão, portanto as aplicações devem conectar ao serviço da PDB em vez de apontar para uma instância RAC individual. Depois, a disponibilidade do Oracle RAC depende de Clusterware, instâncias de banco, serviços, listeners e descritores de conexão cliente trabalhando juntos. O mapa de arquitetura mostra essas dependências e separa o comportamento do serviço padrão dos serviços dedicados para relatórios e batch.", infographic: architectureInfographics.pt },
          { id: "grid", title: "1. Health Checks de Grid Infrastructure", kicker: "Clusterware e nós", body: "O Oracle Clusterware fornece a estrutura de recursos cluster-aware usada pelo RAC. CRSCTL é a interface do Clusterware para verificar saúde do cluster, estado de recursos e associação de nós antes das revisões de banco.", code: { type: "bash", label: "Executar como grid", value: commands.grid }, notes: ["O guia fonte observa que olsnodes -i está obsoleto."] },
          { id: "asm", title: "2. Verificações ASM (Não Aplicável ao Exascale)", kicker: "Expectativa de armazenamento Exascale", body: "Na rota Exadata Exascale usada por esta guia, o armazenamento é apresentado por infraestrutura gerenciada pelo Exascale e não por instâncias ASM gerenciadas pelo cliente. Um recurso ora.asm ausente é uma característica esperada, não necessariamente uma falha.", code: { type: "bash", label: "Verificação de status ASM", value: commands.asm }, expected: commands.asmExpected },
          { id: "listener", title: "3. Health Checks de Listener", kicker: "Listener de nó", body: "Listeners Oracle Net recebem solicitações de conexão cliente e as roteiam para serviços de banco registrados. Em RAC, a saúde do listener faz parte da rota entre endereços SCAN ou de nó e o serviço escolhido pelo cliente.", code: { type: "bash", label: "Status do listener", value: commands.listener }, notes: ["Substitua <node_name> por valores retornados por olsnodes."] },
          { id: "database-health", title: "4. Health Checks de Banco de Dados", kicker: "Contexto do proprietário do banco", body: "SRVCTL é a utilidade de administração esperada para entidades RAC gerenciadas pela Oracle, como bancos, instâncias, listeners e serviços. A revisão de status confirma se cada instância RAC está executando sob controle do Clusterware.", code: { type: "bash", label: "Status do banco", value: commands.database } },
          { id: "database-config", title: "5. Configuração de Banco de Dados", kicker: "Configuração registrada", body: "A configuração do banco é a metadata do Clusterware que descreve como a base RAC é gerenciada, incluindo nomes de instância, Oracle homes, política de inicialização e informações de posicionamento usadas pelo SRVCTL.", code: { type: "bash", label: "Configuração do banco", value: commands.dbConfig } },
          { id: "service-validation", title: "6. Validação de Serviços", kicker: "Configuração e execução de serviços", body: "Serviços RAC são pontos lógicos de entrada para cargas de trabalho. Eles separam nomes de conexão de aplicação de instâncias individuais e carregam atributos de posicionamento, failover e load balancing usados por clientes e pools.", code: { type: "bash", label: "Validação de serviços", value: commands.service } },
          { id: "sql-health", title: "7. Health Checks SQL", kicker: "Views dinâmicas", body: "Views dinâmicas de desempenho expõem o estado atual do banco e das instâncias. Em RAC, views GV$ retornam linhas por instância para comparar status, serviços e sessões entre nós.", code: { type: "sql", label: "Inventário de views SQL", value: commands.sqlViews } },
          { id: "connectivity", title: "8. Validação de Conectividade", kicker: "TNS e SQL*Plus", body: "A validação de conectividade cobre resolução de nomes e criação de sessão. Um alias TNS pode resolver corretamente enquanto a conexão final ao serviço ainda falha, portanto as duas camadas devem ser verificadas.", code: { type: "bash", label: "Validação de conectividade", value: commands.connectivity } },
          { id: "tns-aliases", title: "9. Revisão de Aliases TNS", kicker: "Arquivos de administração de rede", body: "Local naming usa aliases de tnsnames.ora para mapear nomes amigáveis para connect descriptors. Esses descritores definem endereços, nomes de serviço, opções de failover e comportamento de load balancing vistos por clientes.", code: { type: "bash", label: "Revisão de aliases TNS", value: commands.tns }, extraCodes: [{ type: "text", label: "Valores padrão de tnsnames.ora", value: commands.tnsDefaults }] },
{ id: "default-service", title: "10. Revisão da Configuração do Serviço de Conexão Padrão", kicker: "Linha base do serviço de conexão", body: "O serviço PDB padrão é a linha base de entrada de aplicação para este ambiente. Seus atributos SRVCTL mostram posicionamento, tipo de failover, objetivo de connection load balancing e objetivo de runtime load balancing antes de aplicar recomendações.", code: { type: "bash", label: "Configuração do serviço padrão", value: commands.defaultService }, table: { headers: ["Característica", "Valor", "Valores documentados pela Oracle"], rows: [["Failover type", "NONE", "NONE, SESSION, SELECT, TRANSACTION, AUTO"], ["Runtime Load Balancing Goal", "NONE", "NONE, SERVICE_TIME, THROUGHPUT"], ["Connection Load Balancing Goal", "LONG", "SHORT, LONG"]] }, notes: ["Esta saída mostra que o serviço PDB padrão CDB01_PDB01.paas.oracle.com está habilitado para o papel PRIMARY e mapeado para PDB01.", "Cardinality 2 com instâncias preferred CDB011,CDB012 significa que o serviço fica posicionado nas duas instâncias RAC durante operação normal; não há instâncias available listadas para posicionamento alternativo.", "Failover type NONE, failover method NONE, TAF policy NONE, Commit Outcome FALSE e Failover restore NONE significam que este serviço padrão não está configurado para TAF do lado servidor, Transaction Guard nem comportamento de replay estilo Application Continuity.", "Connection Load Balancing Goal LONG favorece balanceamento por contagem de sessões para conexões de maior duração, enquanto Runtime Load Balancing Goal NONE significa que o serviço não publica objetivos de runtime load balancing advisory como SERVICE_TIME ou THROUGHPUT."], postNoteCodes: [{ type: "text", label: "Saída do serviço padrão", description: "Objetivo: revisar a saída SRVCTL capturada nas notas e focar nos atributos de failover e balanceamento de carga que definem o comportamento do serviço padrão.", value: commands.defaultServiceOutput, highlightPatterns: ["Failover type:", "Runtime Load Balancing Goal:", "Connection Load Balancing Goal:"] }], references: [{ label: "Referência de comandos SRVCTL service", url: refs.srvctl }] },
          { id: "oltp", title: "11. Configuração OLTP Recomendada (Eficiente em Memória)", kicker: "Seção de melhores práticas", body: "Serviços OLTP normalmente priorizam transações curtas, comportamento previsível de reconexão e baixo overhead operacional. Esta seção explica uma configuração de failover de sessão que mantém o mesmo nome de serviço e evita criar serviços adicionais.", collapsible: true, code: { type: "bash", label: "Modificação de serviço para failover OLTP", value: commands.oltpModify }, afterCodeNotes: ["-failovertype SESSION altera o serviço do valor padrão capturado Failover type NONE para failover de sessão em clientes compatíveis. Com NONE, o serviço não solicita failover de sessão estilo TAF; uma perda de conexão é devolvida à aplicação ou ao pool para tratamento. Com SESSION, o cliente pode reconectar a uma instância disponível e restaurar o contexto da sessão de banco de dados, mas o trabalho em andamento não é reproduzido automaticamente.",
              "-failovertype SELECT é a opção TAF para continuidade de cursores somente leitura. Para clientes OCI compatíveis, SELECT pode permitir que uma sessão com cursores abertos continue fazendo fetch de linhas após reconectar em outra instância, enquanto SESSION apenas recria a sessão e não tenta recuperar operações select. SELECT adiciona overhead do lado cliente durante o processamento normal de selects, portanto deve ser reservado para cargas que se beneficiam de continuar fetches longos. Com failover BASIC, o segundo nó não mantém sessões backup pré-estabelecidas; ele precisa ter o serviço disponível e capacidade suficiente de CPU, memória e processos para aceitar reconexões quando o failover ocorrer. O failover preconectado seria mais rápido, mas aloca sessões backup antecipadamente e exige que a instância backup suporte essas conexões adicionais."], extraCodes: [{ type: "text", label: "Alias TNS recomendado para a camada de aplicação", value: commands.oltpTnsAlias }], postNoteCodes: [{ type: "sql", label: "Verificação da instância conectada com SQL*Plus", value: commands.oltpInstanceCheck }], postNoteText: ["A saída do SQL*Plus mostra a instância RAC real e o nome de serviço usado pela sessão conectada, confirmando onde o cliente aterrissou após resolver o alias OLTP."], table: { headers: ["Atributo", "Valor recomendado", "Valores documentados pela Oracle"], rows: [["Failover Type", "SESSION", "SRVCTL: NONE, SESSION, SELECT, TRANSACTION, AUTO; TNS FAILOVER_MODE TYPE: session, select, none"], ["Failover Retries", "30", "Quantidade inteira de tentativas"], ["Failover Delay", "5", "Atraso inteiro em segundos"]] }, notes: ["Coloque LOAD_BALANCE=ON e FAILOVER=ON diretamente sob DESCRIPTION porque são opções do connect descriptor. LOAD_BALANCE randomiza a rota de endereços quando há vários endereços listener ou SCAN disponíveis, e FAILOVER permite que o cliente tente outro endereço se o escolhido não estiver disponível durante o connect time.", "O alias omite UR=A neste exemplo OLTP porque a conexão deve usar o registro normal do serviço e o roteamento do listener para CDB01_PDB01.paas.oracle.com."], postNoteReferences: [{ label: "Referência de comandos SRVCTL service", url: refs.srvctl }, { label: "Parâmetros SRVCTL depreciados", url: refs.srvctlCluster }, { label: "Application Continuity", url: refs.appContinuity }, { label: "Parâmetros Oracle Net local naming", url: refs.tnsnames }, { label: "Parâmetros Oracle Net FAILOVER_MODE", url: refs.failoverMode }] },
          { id: "report-service", title: "13. Isolamento de Serviço para Relatórios", kicker: "Serviço dedicado para cargas de relatórios", body: "Cargas de relatórios costumam ser de leitura intensiva, mais longas e mais propensas a gerar varreduras, ordenações, uso de espaço temporário e churn de buffer cache. Um serviço dedicado dá a essa carga seu próprio nome de serviço, política de posicionamento e identidade de monitoramento sem alterar a PDB.", collapsible: true, code: { type: "bash", label: "Criação e validação do serviço de relatórios", value: commands.reportsService }, extraCodes: [{ type: "text", label: "Alias TNS da camada de aplicação para relatórios", value: commands.reportsTnsAlias }, { type: "sql", label: "Verificação da instância conectada com SQL*Plus", value: commands.reportsInstanceCheck }], notes: ["Use nomes de instância de banco em -preferred e -available. Este exemplo envia a carga normal de relatórios para CDB012 e mantém CDB011 disponível apenas quando o serviço de relatórios não puder executar na instância preferred.", "Manter relatórios em uma instância preferred reduz churn de cache entre nós e protege o serviço OLTP de varreduras ou agregações grandes de relatórios. Se o nó preferred de relatórios falhar, o Oracle Clusterware pode iniciar o serviço na instância available para que usuários mantenham um endpoint de serviço.", "O alias TNS de relatórios é intencionalmente mais simples que o alias OLTP da seção 11. Ele omite o bloco FAILOVER_MODE do lado cliente porque este serviço de relatórios usa posicionamento explícito do serviço e comportamento de carga reiniciável em vez de failover de sessão estilo TAF.", "Connection Load Balancing Goal LONG é apropriado para sessões de relatórios que tendem a ser longas e devem ser balanceadas por contagem de sessões em vez de feedback runtime advisory.", "Runtime Load Balancing Goal NONE evita publicar objetivos runtime advisory para cargas de relatórios. Mantenha o roteamento de relatórios explícito para que varreduras ou agregações grandes não concorram diretamente com o serviço OLTP.", "Failover Type NONE é intencional para relatórios porque essa carga normalmente é reiniciável. Se um nó falhar durante um relatório, a aplicação ou ferramenta de relatórios deve reexecutar a consulta ou job em vez de tentar continuar uma instrução longa parcialmente executada."], table: { headers: ["Atributo", "Valor recomendado", "Razão"], rows: [["Connection Load Balancing Goal", "LONG", "Sessões longas de relatórios são melhor balanceadas por contagem de sessões."], ["Runtime Load Balancing Goal", "NONE", "Cargas de relatórios são roteadas explicitamente em vez de usar objetivos RLB advisory."], ["Instâncias preferred / available", "CDB012 / CDB011", "A carga normal de relatórios permanece em uma instância, enquanto a outra fica reservada para failover do serviço."], ["Failover Type", "NONE", "Relatórios são reiniciáveis e devem ser reexecutados pela aplicação ou camada de relatórios após uma falha."]] }, references: [{ label: "Referência de comandos SRVCTL service", url: refs.srvctl }, { label: "Workload management with services", url: refs.srvctlCluster }] },
          { id: "batch-jobs", title: "14. Isolamento de Serviço para Batch Jobs", kicker: "Serviço dedicado para cargas batch", body: "Batch jobs normalmente são programados, consomem recursos e são reiniciáveis. Um serviço batch dedicado dá aos schedulers um endpoint estável para essa carga enquanto separa seu posicionamento normal e métricas de serviço do tráfego OLTP e de relatórios.", collapsible: true, code: { type: "bash", label: "Criação e validação do serviço batch", value: commands.batchService }, extraCodes: [{ type: "text", label: "Alias TNS da camada de aplicação para batch jobs", value: commands.batchTnsAlias }], notes: ["Use nomes de instância de banco em -preferred e -available. Este exemplo envia a carga normal batch para CDB011 e mantém CDB012 disponível apenas quando o serviço batch não puder executar na instância preferred.", "Manter batch jobs em uma instância preferred reduz churn de cache entre nós e facilita medir a carga programada com métricas AWR por serviço. Se o nó preferred de batch falhar, o Oracle Clusterware pode iniciar o serviço na instância available para que o scheduler mantenha um endpoint de serviço.", "Connection Load Balancing Goal LONG é apropriado para sessões batch que tendem a ser longas e devem ser balanceadas por contagem de sessões em vez de feedback runtime advisory.", "Runtime Load Balancing Goal NONE mantém o roteamento batch explícito para que jobs grandes não concorram diretamente com decisões de runtime load balancing de OLTP.", "Failover Type NONE é intencional para batch jobs porque essa carga normalmente é reiniciável. Se um nó falhar durante um passo batch, o scheduler ou a aplicação deve reexecutar o passo do job em vez de tentar continuar uma instrução longa parcialmente executada."], table: { headers: ["Atributo", "Valor recomendado", "Razão"], rows: [["Connection Load Balancing Goal", "LONG", "Sessões batch longas são melhor balanceadas por contagem de sessões."], ["Runtime Load Balancing Goal", "NONE", "Cargas batch são roteadas explicitamente em vez de usar objetivos RLB advisory."], ["Instâncias preferred / available", "CDB011 / CDB012", "A carga normal batch permanece em uma instância, enquanto a outra fica reservada para failover do serviço."], ["Failover Type", "NONE", "Batch jobs são reiniciáveis e devem ser reexecutados pelo scheduler ou pela aplicação após uma falha."]] }, references: [{ label: "Referência de comandos SRVCTL service", url: refs.srvctl }, { label: "Workload management with services", url: refs.srvctlCluster }] },
          { id: "session-memory", title: "15. Consultas de distribuição de sessões e memória", kicker: "Validação de sessões e memória RAC", body: "A distribuição de sessões e memória é a evidência runtime de que o posicionamento de serviços funciona como esperado. GV$SESSION, GV$PROCESS, GV$SERVICES e metadata de containers permitem comparar carga conectada e uso de PGA por instância, PDB e serviço.", collapsible: true, code: { type: "sql", label: "Sessões por instância", description: "Objetivo: obter uma contagem rápida de sessões por instância RAC. Use como primeira verificação de balanceamento após mudanças de serviço ou testes de failover para ver se uma instância concentra a maior parte da carga conectada.", value: commands.sessionsPerInstance }, extraCodes: [{ type: "sql", label: "Sessões por PDB e instância", description: "Objetivo: detalhar a contagem de sessões por PDB, instância RAC e nome do serviço de conexão. Mostra qual endpoint de serviço posiciona sessões em cada instância e ajuda a confirmar se conexões OLTP, relatórios ou batch chegam onde esperado.", value: commands.sessionsPerPdbInstance }, { type: "sql", label: "Uso de memória por PDB e instância RAC", description: "Objetivo: estimar a memória PGA alocada por sessões de usuário para cada PDB em cada instância RAC. Use para identificar pressão de memória, posicionamento desigual de serviços ou uma classe de carga consumindo mais memória de processos em um nó.", value: commands.memoryPerPdbInstance }, { type: "sql", label: "Distribuição de memória em todo o cluster", description: "Objetivo: agregar o uso de PGA por PDB em toda a base RAC. Destaca qual PDB é o maior consumidor de memória independentemente da instância e ajuda a priorizar análise mais profunda de sessões ou SQL.", value: commands.clusterMemoryDistribution }, { type: "sql", label: "Dashboard de carga de trabalho RAC", description: "Objetivo: combinar contagem de sessões, PGA total e PGA média por sessão por PDB e instância. Use como dashboard compacto de carga para comparar volume e intensidade de memória entre nós RAC antes e depois de mudanças de configuração de serviços.", value: commands.racWorkloadDashboard }], notes: ["Execute estas consultas a partir de uma conta DBA ou de monitoramento com acesso a GV$SESSION, GV$PROCESS e V$CONTAINERS.", "Use a saída após mudanças de serviço, testes de failover ou mudanças de isolamento de carga para confirmar que as sessões e a memória PGA estão distribuídas conforme esperado."], references: [{ label: "Visões dinâmicas de desempenho", url: refs.dynamicViews }] },
          { id: "rlb", title: "16. Configuração OLTP Recomendada para Runtime Load Balancing", kicker: "Balanceamento runtime", body: "Runtime load balancing é um mecanismo de service advisory consumido por pools de conexão integrados. Ele ajuda novas solicitações a preferirem a instância que oferece o melhor objetivo de serviço atual, mas o modelo de conexão da aplicação precisa ser compatível com roteamento baseado em pool.", collapsible: true, code: { type: "bash", label: "Aplicar atualização de serviço para runtime load balancing", value: commands.oltpRlbModify }, extraCodes: [{ type: "bash", label: "Validar configuração atualizada do serviço", value: commands.oltpRlbVerify }, { type: "sql", label: "Verificar configuração do serviço em GV$SERVICES", value: commands.rlbServiceSettingsSql }, { type: "sql", label: "Verificação da instância conectada com SQL*Plus", value: commands.rlbInstanceCheck }], notes: ["Esta mudança mantém o SERVICE_NAME existente, então clientes de aplicação podem continuar usando CDB01_PDB01.paas.oracle.com.", "Execute o comando de validação depois do comando modify para confirmar que o SRVCTL reporta Connection Load Balancing Goal SHORT e Runtime Load Balancing Goal THROUGHPUT para o serviço.", "Use a consulta GV$SERVICES a partir de uma conta DBA ou de monitoramento para confirmar linhas por instância onde CLB_GOAL é SHORT e GOAL é THROUGHPUT dentro do banco de dados.", "Não é necessário um alias separado da camada de aplicação para esta seção. Runtime load balancing é controlado por atributos do serviço, então aliases existentes da seção 9 ou seção 11 que resolvem para CDB01_PDB01.paas.oracle.com herdam o comportamento atualizado do serviço.", "Comparada ao alias OLTP da seção 11, a sintaxe de conexão pode permanecer mais simples aqui porque runtime load balancing é controlado pela configuração do serviço e advisories de pools integrados, não pela inclusão de um bloco FAILOVER_MODE do lado cliente no descritor TNS.", "Runtime load balancing funciona melhor para modelos de solicitação stateless em que conexões do pool são obtidas, usadas durante uma solicitação curta e devolvidas ao pool. Habilite Fast Connection Failover e use pools UCP, WebLogic, OCI ou ODP.NET que consomem eventos FAN e RAC load balancing advisory.", "Para aplicações stateful, revise antes de habilitar THROUGHPUT globalmente. Conversas longas, package globals, tabelas temporárias, estado de sessão alterado, cursores abertos ou suposições de afinidade podem reduzir o benefício porque o pool não pode rotear livremente cada nova solicitação. Mova o estado conversacional para a camada de aplicação ou para uma tabela, reinicie o estado de sessão ao devolver conexões ao pool, marque limites de solicitação e valide a cobertura de Application Continuity ou Transparent Application Continuity antes de depender de replay.", "Connection Load Balancing Goal SHORT é o objetivo de conexão recomendado para pools integrados que usam advisories de runtime load balancing.", "Runtime Load Balancing Goal THROUGHPUT roteia trabalho para a instância que conclui trabalho na taxa mais alta. Use SERVICE_TIME quando o principal objetivo for tempo de resposta de transações OLTP curtas; use connection balancing LONG principalmente para cargas fechadas ou estilo batch."], table: { headers: ["Atributo", "Valor recomendado", "Valor padrão", "Valores documentados pela Oracle"], rows: [["Connection Load Balancing Goal", "SHORT", "LONG", "SHORT, LONG"], ["Runtime Load Balancing Goal", "THROUGHPUT", "NONE", "NONE, SERVICE_TIME, THROUGHPUT"]] }, references: [{ label: "Referência de comandos SRVCTL service", url: refs.srvctl }, { label: "Run-time connection load balancing", url: refs.rlb }, { label: "Fast Connection Failover", url: refs.fcf }, { label: "Application Continuity", url: refs.appContinuity }, { label: "Referência GV$SERVICES", url: refs.gvservices }] },
          { id: "operational-notes", title: "Notas Operacionais Exascale", kicker: "Contexto de execução", body: "Consistência operacional importa porque revisões RAC cruzam usuários de sistema operacional, Oracle homes, variáveis de ambiente, nomes de nó e nomes de serviço. Manter essas substituições explícitas reduz falsos achados durante validação após mudanças.", bullets: ["Comandos de Grid como usuário grid.", "Comandos de banco como usuário oracle.", "Usar $ORACLE_UNQNAME.", "Substituir <node_name> por valores de olsnodes."] }
        ],
        calloutsTitle: "Conceitos de Continuidade e Serviços",
        calloutsIntro: "Estes conceitos contextualizam os termos de serviço e failover que aparecem em discussões de RAC, balanceamento de carga e continuidade de aplicações.",
        callouts: [
          { id: "scan", term: "SCAN", name: "Single Client Access Name", text: "Recurso de RAC que oferece aos clientes um nome único para acessar bancos em cluster.", ref: refs.scan },
          { id: "rac", term: "RAC", name: "Real Application Clusters", text: "Arquitetura de banco em cluster cujas instâncias, serviços e listeners são verificados neste guia.", ref: refs.racListener },
          { id: "fan", term: "FAN", name: "Fast Application Notification", text: "Notificações de alta disponibilidade usadas por clientes e pools integrados para reagir rapidamente a mudanças de serviço.", ref: refs.fan },
          { id: "clb", term: "CLB", name: "Connection Load Balancing", text: "Objetivo de distribuição de conexões no nível do serviço que influencia como novas sessões são posicionadas entre instâncias RAC, usando SHORT para pools com runtime advisory e LONG para sessões de maior duração.", ref: refs.rlb },
          { id: "rlb", term: "RLB", name: "Runtime Load Balancing", text: "Comportamento de pool de conexões que usa informações RAC advisory e objetivos de serviço como SERVICE_TIME ou THROUGHPUT.", ref: refs.rlb },
          { id: "taf", term: "TAF", name: "Transparent Application Failover", text: "Comportamento de failover do lado cliente para clientes Oracle Net e JDBC suportados, usado aqui em exemplos de failover de sessão.", ref: refs.taf },
          { id: "ac", term: "AC", name: "Application Continuity", text: "Capacidade de alta disponibilidade para recuperar trabalho de aplicação após interrupções recuperáveis quando serviço e cliente oferecem suporte.", ref: refs.appContinuity },
          { id: "tac", term: "TAC", name: "Transparent Application Continuity", text: "Modo de Application Continuity que pode descobrir limites de requisição em aplicações e clientes suportados.", ref: refs.appContinuity }
        ],
        glossaryTitle: "Glossário e Referências de Documentação Oracle",
        glossaryIntro: "Glossário com referências para conceitos, comandos, views e arquivos de configuração usados no guia.",

      }

    article.es.glossary = article.en.glossary.map((entry) => ({
      ...entry,

    function CodePanel({ block, controls }) {
      const [copied, setCopied] = useState(false);
      const description = block.description || (controls.snippetObjectives && controls.snippetObjectives[block.label]);
      const highlightPatterns = block.highlightPatterns || [];
      const codeLines = highlightPatterns.length ? String(block.value).split("\n") : null;
      const palette = {
        bash: "border-emerald-500/35 bg-[#111917]",
        java: "border-amber-500/35 bg-[#17130d]",
        sql: "border-sky-500/35 bg-[#101922]",
        text: "border-stone-500/35 bg-[#171412]",
        diagram: "border-orange-400/35 bg-[#191511]"
      };

      function legacyCopy(text) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.top = "0";
        textarea.style.left = "0";
        textarea.style.width = "1px";
        textarea.style.height = "1px";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        let ok = false;
        try {
          ok = document.execCommand("copy");
        } finally {
          document.body.removeChild(textarea);
        }
        return ok;
      }

      async function copyCode() {
        let ok = false;
        if (navigator.clipboard && navigator.clipboard.writeText && window.isSecureContext) {
          try {
            await navigator.clipboard.writeText(block.value);
            ok = true;
          } catch (error) {
            ok = false;
          }
        }
        if (!ok) {
          ok = legacyCopy(block.value);
        }
        setCopied(ok);
        if (ok) {
          window.setTimeout(() => setCopied(false), 1500);
        }
      }

      function shouldHighlight(line) {
        return highlightPatterns.some((pattern) => line.includes(pattern));
      }

      return (
        <figure className={cx("overflow-hidden rounded-lg border shadow-sm", palette[block.type] || palette.text)}>
          <div className="flex items-center justify-between gap-4 border-b border-white/10 px-4 py-2">
            <figcaption className="text-xs font-semibold uppercase tracking-wide text-stone-200">
              {block.label || controls.command}
            </figcaption>
            <button
              type="button"
              onClick={copyCode}
              className="rounded-md border border-white/15 bg-white/10 px-3 py-1 text-xs font-semibold text-white transition hover:bg-white/18 focus:outline-none focus:ring-2 focus:ring-white/60"
              aria-label={`${controls.copy}: ${block.label || controls.command}`}
            >
              {copied ? controls.copied : controls.copy}
            </button>
          </div>
          {description && (
            <div className="border-b border-white/10 px-4 py-3 text-sm leading-6 text-stone-200">
              {description}
            </div>
          )}
          <pre className="code-scroll overflow-x-auto p-4 text-[13px] leading-6 text-stone-100"><code>{codeLines ? codeLines.map((line, index) => (
            <span key={index} className={cx("block px-1", shouldHighlight(line) && "rounded-sm bg-emerald-400/15 text-emerald-200")}>{line || " "}</span>
          )) : block.value}</code></pre>
        </figure>
      );
    }

      useEffect(() => {
        document.documentElement.classList.toggle("dark", dark);
        localStorage.setItem("exascale-theme", dark ? "dark" : "light");
      }, [dark]);

      const toc = useMemo(() => [
        ...t.sections.map(({ id, title }) => ({ id, title })),
        { id: "concepts", title: t.calloutsTitle },
        { id: "glossary", title: t.glossaryTitle }
      ], [t]);

      return (
        <div className="min-h-screen">
          <header id="top" className="article-gradient border-b border-stone-200 dark:border-stone-800">
            <div className="mx-auto max-w-7xl px-5 py-6 sm:px-8">
              <nav className="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between" aria-label="Page controls">
                <div className="flex items-center gap-3">
                  <div className="h-9 w-9 rounded-md bg-oracle-red shadow-sm" aria-hidden="true"></div>
                  <div>
                    <p className="text-sm font-semibold text-stone-900 dark:text-white">Oracle Exadata Exascale</p>
                    <p className="text-xs text-stone-600 dark:text-stone-400">26ai RAC Health Check</p>
                  </div>
                </div>
                <div className="flex flex-wrap items-center gap-2">
                  <span className="sr-only">{t.controls.language}</span>
                  <div className="flex rounded-lg border border-stone-300 bg-white p-1 shadow-sm dark:border-stone-700 dark:bg-stone-900">
                    {Object.entries(article).map(([key, value]) => (
                      <button
                        key={key}
                        type="button"
                        onClick={() => setLang(key)}
                        className={cx(
                          "rounded-md px-3 py-1.5 text-sm font-semibold transition focus:outline-none focus:ring-2 focus:ring-oracle-red/60",
                          lang === key ? "bg-oracle-red text-white" : "text-stone-700 hover:bg-stone-100 dark:text-stone-300 dark:hover:bg-stone-800"
                        )}
                        aria-pressed={lang === key}
                      >
                        {value.label}
                      </button>
                    ))}
                  </div>
                  <button
                    type="button"
                    onClick={() => setDark((value) => !value)}
                    className="rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm font-semibold text-stone-700 shadow-sm transition hover:bg-stone-100 focus:outline-none focus:ring-2 focus:ring-oracle-red/60 dark:border-stone-700 dark:bg-stone-900 dark:text-stone-200 dark:hover:bg-stone-800"
                    aria-pressed={dark}
                  >
                    {dark ? t.controls.themeLight : t.controls.themeDark}
                  </button>
                </div>
              </nav>

              <div className="grid gap-5 py-6 sm:gap-6 sm:py-10 lg:grid-cols-[minmax(0,1fr)_360px] lg:items-end lg:gap-8 lg:py-12">
                <div className="max-w-4xl">
                  <p className="text-sm font-semibold uppercase tracking-[0.18em] text-oracle-red dark:text-orange-300">{t.eyebrow}</p>
                  <h1 className="mt-4 text-3xl font-bold leading-tight tracking-tight text-stone-950 dark:text-white sm:text-5xl lg:text-6xl">{t.title}</h1>
                  <p className="mt-4 max-w-3xl text-base leading-7 text-stone-700 dark:text-stone-300 sm:text-lg sm:leading-8">{t.subtitle}</p>
                  <div className="mt-5 flex min-w-0 flex-wrap gap-3 text-sm text-stone-600 dark:text-stone-400">
                    <span className="max-w-full rounded-md border border-stone-300 bg-white px-3 py-1.5 break-words dark:border-stone-700 dark:bg-stone-900">{t.updated}</span>
                  </div>
                  <div className="mt-5 max-w-3xl">
                    <Disclaimer title={t.disclaimerTitle} text={t.disclaimer} />
                  </div>
                </div>
                <aside className="rounded-lg border border-stone-200 bg-white p-4 shadow-subtle dark:border-stone-700 dark:bg-[#211d1b] sm:p-5">
                  <h2 className="text-sm font-bold uppercase tracking-[0.16em] text-stone-500 dark:text-stone-400">{t.controls.highlights}</h2>
                  <ul className="mt-3 space-y-1.5 sm:mt-4 sm:space-y-3">
                    {t.highlights.map((item) => (
                      <li key={item} className="flex gap-3 text-sm leading-5 text-stone-700 dark:text-stone-300 sm:leading-6">
                        <span className="mt-2 h-2 w-2 flex-none rounded-full bg-oracle-red" aria-hidden="true"></span>
                        <span>{item}</span>
                      </li>
                    ))}
                  </ul>
                </aside>
              </div>
            </div>
          </header>

          <div className="sticky top-0 z-30 border-b border-stone-200 bg-white/95 backdrop-blur lg:hidden dark:border-stone-800 dark:bg-[#171412]/95">
            <nav className="mx-auto flex max-w-7xl gap-2 overflow-x-auto px-5 py-3" aria-label={t.controls.toc}>
              {toc.map((item) => (
                <a key={item.id} href={`#${item.id}`} className="whitespace-nowrap rounded-md border border-stone-200 px-3 py-1.5 text-sm font-medium text-stone-700 dark:border-stone-700 dark:text-stone-300">
                  {item.title.replace(/^\d+\.\s*/, "")}
                </a>
              ))}
            </nav>
          </div>

          <main className="mx-auto grid max-w-7xl gap-8 px-5 py-8 sm:px-8 lg:grid-cols-[280px_minmax(0,1fr)] lg:py-12">
            <aside className="hidden lg:block">
              <div className="sticky top-6 rounded-lg border border-stone-200 bg-white p-4 shadow-sm dark:border-stone-800 dark:bg-[#211d1b]">
                <h2 className="text-xs font-bold uppercase tracking-[0.16em] text-stone-500 dark:text-stone-400">{t.controls.toc}</h2>
                <nav className="mt-4 space-y-1" aria-label={t.controls.toc}>
                  {toc.map((item) => (
                    <a key={item.id} href={`#${item.id}`} className="block rounded-md px-3 py-2 text-sm font-medium text-stone-700 transition hover:bg-stone-100 hover:text-oracle-red focus:outline-none focus:ring-2 focus:ring-oracle-red/40 dark:text-stone-300 dark:hover:bg-stone-800 dark:hover:text-orange-200">
                      {item.title}
                    </a>
                  ))}
                </nav>
              </div>
            </aside>

            <article className="min-w-0">
              {t.sections.map((section) => (
                <ArticleSection key={section.id} section={section} controls={t.controls} />
              ))}

              <section id="concepts" className="border-t border-stone-200 py-10 dark:border-stone-800">
                <div className="space-y-3">
                  <p className="text-xs font-semibold uppercase tracking-[0.16em] text-oracle-red dark:text-orange-300">RAC context</p>
                  <h2 className="text-2xl font-bold tracking-tight text-stone-950 dark:text-white sm:text-3xl">{t.calloutsTitle}</h2>
                  <p className="max-w-3xl text-base leading-7 text-stone-700 dark:text-stone-300">{t.calloutsIntro}</p>
                </div>
                <div className="mt-7 grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
                  {t.callouts.map((item) => (
                    <a key={item.id} href={item.ref} target="_blank" rel="noreferrer" className="group rounded-lg border border-stone-200 bg-white p-5 shadow-sm transition hover:-translate-y-0.5 hover:border-oracle-red/60 hover:shadow-subtle dark:border-stone-700 dark:bg-[#211d1b]">
                      <div className="flex items-center justify-between gap-3">
                        <span className="rounded-md bg-oracle-red px-3 py-1 text-lg font-black tracking-wide text-white">{item.term}</span>
                        <span className="text-xs font-semibold uppercase tracking-[0.16em] text-stone-400 group-hover:text-oracle-red dark:group-hover:text-orange-300">{t.controls.refs}</span>
                      </div>
                      <h3 className="mt-4 text-lg font-bold text-stone-950 dark:text-white">{item.name}</h3>
                      <p className="mt-2 text-sm leading-6 text-stone-700 dark:text-stone-300">{item.text}</p>
                    </a>
                  ))}
                </div>
              </section>

              <section id="glossary" className="border-t border-stone-200 py-10 dark:border-stone-800">
                <div className="space-y-3">
                  <p className="text-xs font-semibold uppercase tracking-[0.16em] text-oracle-red dark:text-orange-300">{t.controls.refs}</p>
                  <h2 className="text-2xl font-bold tracking-tight text-stone-950 dark:text-white sm:text-3xl">{t.glossaryTitle}</h2>
                  <p className="max-w-3xl text-base leading-7 text-stone-700 dark:text-stone-300">{t.glossaryIntro}</p>
                </div>
                <div className="mt-7 grid gap-4 md:grid-cols-2">
                  {t.glossary.map((entry) => (
                    <div key={entry.term} className="rounded-lg border border-stone-200 bg-white p-5 dark:border-stone-700 dark:bg-[#211d1b]">
                      <h3 className="text-base font-bold text-stone-950 dark:text-white">{entry.term}</h3>
                      <p className="mt-2 text-sm leading-6 text-stone-700 dark:text-stone-300">{entry.text}</p>
                      <a href={entry.ref} target="_blank" rel="noreferrer" className="mt-3 inline-flex rounded-md text-sm font-semibold text-oracle-red underline-offset-4 hover:underline dark:text-orange-300">
                        {t.controls.refs}
                      </a>
                    </div>
                  ))}
                </div>
              </section>
            </article>
          </main>

          <footer className="border-t border-stone-200 bg-stone-50 px-5 py-8 text-center text-sm text-stone-600 dark:border-stone-800 dark:bg-[#12100f] dark:text-stone-400">
            <div className="mx-auto max-w-4xl">
              <Disclaimer title={t.disclaimerTitle} text={t.disclaimer} compact />
              <p className="mt-5">{t.updated}</p>
            </div>
          </footer>

          <button
            type="button"
            onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
            className="fixed bottom-5 right-5 rounded-lg border border-stone-300 bg-white px-4 py-3 text-sm font-bold text-stone-800 shadow-subtle transition hover:border-oracle-red hover:text-oracle-red focus:outline-none focus:ring-2 focus:ring-oracle-red/50 dark:border-stone-700 dark:bg-stone-900 dark:text-stone-100 dark:hover:text-orange-300"
          >
            {t.controls.backTop}
          </button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
